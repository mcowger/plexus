adminKey: "change-me-monitoring-admin-key"
providers:
  local-openai:
    display_name: Local OpenAI
    api_base_url: https://api.openai.com/v1
    api_key: "your-provider-api-key"
    models:
      - gpt-4o-mini
models:
  gpt-4o-mini:
    selector: random
    targets:
      - provider: local-openai
        model: gpt-4o-mini
keys:
  local-test:
    secret: "sk-change-me-plexus"
    comment: "Local monitoring test key"
