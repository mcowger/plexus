get:
  tags:
    - Inference — Models
  summary: OpenRouter model slugs known to Plexus (public)
  description: |
    Returns all model slugs from the OpenRouter catalog.

    The catalog is loaded at startup and refreshed periodically (see
    `/v0/management/models/metadata/refresh` for a manual refresh). Returns 503
    if the catalog hasn't been loaded yet.
  security: []
  parameters:
    - in: query
      name: q
      schema:
        type: string
      description: Optional substring filter applied to slug names.
  responses:
    '200':
      description: Slug list.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: string
              count:
                type: integer
            required:
              - data
              - count
    '400':
      description: Bad request.
    '503':
      description: Pricing catalog has not loaded yet.
  operationId: getV1OpenrouterModels
