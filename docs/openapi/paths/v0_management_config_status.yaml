get:
  tags:
    - Management — Config
  summary: Configuration deployment status (admin only)
  description: |
    Returns status flags about the current configuration state.

    ## adminKeyFromYaml

    - **true** — Server is still using `ADMIN_KEY` from `plexus.yaml` (deprecated legacy mode)
    - **false** — Server is using the configured `ADMIN_KEY` from environment variables

    This flag helps diagnose authentication issues during migrations from
    file-based to env-based admin keys.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  responses:
    '200':
      description: Status flags.
      content:
        application/json:
          schema:
            type: object
            properties:
              adminKeyFromYaml:
                type: boolean
                description: >
                  True when the server is still bootstrapping ADMIN_KEY from
                  plexus.yaml (deprecated). False when using env-based key.
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementConfigStatus