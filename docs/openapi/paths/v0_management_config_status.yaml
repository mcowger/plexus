get:
  tags:
    - Management — Config
  summary: Configuration deployment status (admin only)
  description: |
    Returns status flags about the current configuration state.

    **Note:** Plexus no longer supports file-based configuration (YAML).
    All configuration is stored in the database and managed via the Admin UI
    or Management API.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  responses:
    '200':
      description: Status flags.
      content:
        application/json:
          schema:
            type: object
            properties: {}
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementConfigStatus