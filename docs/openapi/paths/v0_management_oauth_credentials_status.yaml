get:
  tags:
    - Management — OAuth
  summary: Check whether OAuth credentials exist (admin only)
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: providerId
      required: true
      schema:
        type: string
    - in: query
      name: accountId
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Status.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  ready:
                    type: boolean
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementOauthCredentialsStatus
