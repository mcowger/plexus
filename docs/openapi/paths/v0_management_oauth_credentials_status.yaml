get:
  tags:
    - Management — OAuth
  summary: Check whether OAuth credentials exist (admin only)
  description: |
    Polls whether credentials exist for a provider/account combination.

    ## Use case

    Used by the UI to determine if a provider is "connected" (can make
    requests) or needs re-authentication.

    ## Response

    - `ready: true` — Credentials exist and the provider can be used
    - `ready: false` — No credentials found; user needs to start OAuth flow

    ## Note

    This endpoint requires both `providerId` and `accountId` as query
    parameters. The credentials are keyed by both values.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: providerId
      required: true
      schema:
        type: string
      description: Provider ID to check.
    - in: query
      name: accountId
      required: true
      schema:
        type: string
      description: Account identifier to check.
  responses:
    '200':
      description: Status.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  ready:
                    type: boolean
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementOauthCredentialsStatus