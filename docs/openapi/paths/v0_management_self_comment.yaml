patch:
  tags:
    - Management — Auth
  summary: Update the current principal's key comment
  description: |
    Updates the freeform comment/description on a key.

    ## Usage

    - Limited callers update their own key's comment
    - Admins can update any key by passing `?keyName=<name>`

    ## Null vs empty string

    - Setting `comment: null` removes the comment entirely
    - Setting `comment: ""` (empty string) is also valid and stored as-is

    There's no length limit enforced by the API (though the UI may truncate
    display for very long values).
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: keyName
      schema:
        type: string
      description: >
        Admin-only: specify which key to update. Limited callers always
        update their own key.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            comment:
              type:
                - string
                - 'null'
              description: New comment value (null to remove).
  responses:
    '200':
      description: Updated.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                const: true
              keyName:
                type: string
              comment:
                type:
                  - string
                  - 'null'
    '401':
      description: Authentication required or invalid credentials.
  operationId: patchV0ManagementSelfComment