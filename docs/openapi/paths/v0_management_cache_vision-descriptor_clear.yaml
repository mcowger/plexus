post:
  tags:
    - Management — Config
  summary: Clear the vision descriptor cache (admin only)
  description: |
    Clears the in-memory cache of image descriptions generated by the vision
    fallthrough descriptor model.

    ## What this does

    - Evicts all cached image → description mappings immediately
    - The next request containing a previously-seen image will trigger a fresh
      descriptor call to the configured fallthrough model

    ## When to use

    - The descriptor model has been changed and you want fresh descriptions
    - A cached description is known to be wrong or stale
    - Debugging vision fallthrough behaviour

    ## Notes

    - The cache is in-memory only and does not persist across restarts
    - Maximum cache size is 500 entries; the cache is automatically managed
      with LRU eviction, so manual clearing is rarely necessary

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  responses:
    '200':
      description: Cache cleared successfully.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                const: true
              message:
                type: string
    '401':
      description: Authentication required or invalid credentials.
  operationId: postV0ManagementCacheVisionDescriptorClear
