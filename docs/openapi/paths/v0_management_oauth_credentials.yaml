delete:
  tags:
    - Management — OAuth
  summary: Delete OAuth credentials (admin only)
  security:
    - AdminKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            providerId:
              type: string
            accountId:
              type: string
          required:
            - providerId
            - accountId
  responses:
    '200':
      description: Deletion result.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  deleted:
                    type: boolean
                    const: true
    '404':
      description: Credentials not found.
  operationId: deleteV0ManagementOauthCredentials
