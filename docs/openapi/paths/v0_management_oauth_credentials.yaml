delete:
  tags:
    - Management — OAuth
  summary: Delete OAuth credentials (admin only)
  description: |
    Removes stored OAuth credentials from disk.

    ## Disk location

    Credentials are stored in the Plexus data directory (typically
    `~/.plexus/credentials/` or configured via `PLEXUS_DATA_DIR`).

    ## Impact

    - Any pending sessions for this provider/account combination become invalid
    - Requests to that provider will fail with auth errors until re-authenticated
    - The provider disappears from `/self/quota` status checks

    ## 404 conditions

    - The credentials for the specified provider/accountId don't exist
    - The provider doesn't support OAuth (check `/oauth/providers`)

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            providerId:
              type: string
              example: openai-codex
              description: Provider ID.
            accountId:
              type: string
              example: work
              description: Account identifier.
          required:
            - providerId
            - accountId
  responses:
    '200':
      description: Deletion result.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  deleted:
                    type: boolean
                    const: true
    '404':
      description: Credentials not found.
  operationId: deleteV0ManagementOauthCredentials