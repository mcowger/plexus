get:
  tags:
    - Management — Debug
  summary: List captured debug logs
  description: Limited principals see only logs attributed to their own key.
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: limit
      schema:
        type: integer
        default: 50
    - in: query
      name: offset
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: Log index.
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                requestId:
                  type: string
                  format: uuid
                createdAt:
                  type: integer
                  description: Epoch ms.
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementDebugLogs
delete:
  tags:
    - Management — Debug
  summary: Delete all debug logs (admin only)
  security:
    - AdminKey: []
  responses:
    '200':
      $ref: ../components/responses/SuccessTrue.yaml
    '401':
      description: Authentication required or invalid credentials.
  operationId: deleteV0ManagementDebugLogs
