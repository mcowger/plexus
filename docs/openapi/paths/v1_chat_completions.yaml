post:
  tags:
    - Inference — Chat
  summary: OpenAI-compatible chat completion
  description: |
    Drop-in replacement for `POST https://api.openai.com/v1/chat/completions`.
    The full OpenAI request schema is accepted as-is.

    ## Transformer pipeline

    Requests flow through:
    1. `model` field resolved against configured aliases → target provider
    2. Request transformed to target provider format
    3. Upstream call executed
    4. Response transformed back to OpenAI shape

    ## Routing

    The `model` value is matched against configured aliases. If no alias matches,
    Plexus treats it as a direct `provider/model` syntax and attempts passthrough.

    ## Caching

    Plexus respects standard cache headers:
    - `Cache-Control: no-cache` — bypasses any response caching
    - `x-plexus-force-fresh` — forces a fresh upstream request

    Add `:label` to your API key (e.g. `sk-abc:copilot`) to tag usage with attribution.

    ## Streaming

    When `stream: true`, responses use Server-Sent Events (`text/event-stream`)
    with `data: {...}` frames containing chat completions deltas, terminated by
    `data: [DONE]`.

    Forwarded client headers: `x-app` (echoed into usage `plexus_metadata.clientHeaders`),
    `session_id`, `x-client-request-id` (for prompt cache routing on `/v1/responses`).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChatCompletionRequest.yaml
        examples:
          simple:
            summary: Minimal non-streaming call
            value:
              model: fast-model
              messages:
                - role: user
                  content: Say hello.
          streaming:
            summary: Streaming call
            value:
              model: smart-model
              stream: true
              messages:
                - role: system
                  content: You are terse.
                - role: user
                  content: List 3 primes.
  responses:
    '200':
      description: |
        A non-streamed JSON response or, when `stream: true`,
        a `text/event-stream` of `data: {...}` frames terminated by
        `data: [DONE]`.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChatCompletionResponse.yaml
        text/event-stream:
          schema:
            type: string
            description: SSE frames of Chat Completions deltas.
    '400':
      $ref: ../components/responses/BadRequestOpenAI.yaml
    '401':
      $ref: ../components/responses/AuthError.yaml
    '429':
      $ref: ../components/responses/QuotaExceeded.yaml
    5XX:
      $ref: ../components/responses/ProviderError.yaml
  operationId: postV1ChatCompletions
