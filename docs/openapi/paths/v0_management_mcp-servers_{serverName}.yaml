parameters:
  - in: path
    name: serverName
    required: true
    schema:
      type: string
      pattern: ^[a-z0-9][a-z0-9-_]{1,62}$
    description: >
      Server name (lowercase alphanumeric, max 64 chars). Must match pattern
      `^[a-z0-9][a-z0-9-_]{1,62}$`.
get:
  tags:
    - Management — Config
  summary: Get an MCP server entry by name (admin only)
  description: |
    Returns a single configured MCP gateway server entry.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  responses:
    '200':
      description: MCP server configuration.
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  name:
                    type: string
              - $ref: ../components/schemas/McpServerConfig.yaml
    '404':
      description: MCP server not found.
  operationId: getV0ManagementMcpserversByserverName
put:
  tags:
    - Management — Config
  summary: Create or replace an MCP server entry (admin only)
  description: |
    Creates or replaces an MCP server configuration.

    ## Server name constraints

    - Must start with alphanumeric (not underscore)
    - Max 64 characters
    - Can contain lowercase letters, numbers, and hyphens/underscores

    The request body contains the upstream URL, enabled flag, and optional
    static headers forwarded to the upstream MCP server.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/McpServerConfig.yaml
  responses:
    '200':
      description: Saved.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                const: true
              name:
                type: string
    '400':
      description: Invalid server name or body.
  operationId: putV0ManagementMcpserversByserverName
patch:
  tags:
    - Management — Config
  summary: Merge updates into an MCP server entry (admin only)
  description: |
    Merges the request body into the existing MCP server configuration, then
    validates the result against `McpServerConfig`.

    PATCH performs a shallow merge; omitted fields keep their current values.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
  responses:
    '200':
      description: Saved.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                const: true
              name:
                type: string
    '400':
      description: Invalid server name or body.
    '404':
      description: MCP server not found.
  operationId: patchV0ManagementMcpserversByserverName
delete:
  tags:
    - Management — Config
  summary: Delete an MCP server entry (admin only)
  description: |
    Removes an MCP server configuration.

    ## Impact

    The `/mcp/{serverName}` endpoints will return 404 for this server.
    Any in-flight proxy requests will fail.

    **Admin only** — limited principals receive 403.
  security:
    - AdminKey: []
  responses:
    '200':
      description: Deleted.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SuccessTrue.yaml
    '401':
      description: Authentication required or invalid credentials.
  operationId: deleteV0ManagementMcpserversByserverName