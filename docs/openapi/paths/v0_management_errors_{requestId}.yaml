parameters:
  - in: path
    name: requestId
    required: true
    schema:
      type: string
      format: uuid
    description: The request ID of the error log to delete.
delete:
  tags:
    - Management — Errors
  summary: Delete a single error log
  description: |
    Delete a specific error log by request ID.

    **Admin only** — limited principals receive 403.

    Returns 404 if not found.
  security:
    - AdminKey: []
  responses:
    '200':
      $ref: ../components/responses/SuccessTrue.yaml
    '404':
      description: Not found.
  operationId: deleteV0ManagementErrorsByrequestId