get:
  tags:
    - Management — Errors
  summary: List inference error logs
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: limit
      schema:
        type: integer
        default: 50
    - in: query
      name: offset
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: Array of error records.
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              additionalProperties: true
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementErrors
delete:
  tags:
    - Management — Errors
  summary: Delete all error logs (admin only)
  security:
    - AdminKey: []
  responses:
    '200':
      $ref: ../components/responses/SuccessTrue.yaml
    '401':
      description: Authentication required or invalid credentials.
  operationId: deleteV0ManagementErrors
