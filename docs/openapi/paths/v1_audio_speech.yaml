post:
  tags:
    - Inference — Audio
  summary: OpenAI-compatible text-to-speech
  description: |
    Generates audio from text. Pass-through to the provider. Returns binary
    audio by default; set `stream_format: "sse"` to receive
    `speech.audio.delta` / `speech.audio.done` events instead (not
    supported on `tts-1`/`tts-1-hd`).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SpeechRequest.yaml
        examples:
          basic:
            value:
              model: tts-1
              input: Hello world.
              voice: alloy
  responses:
    '200':
      description: Binary audio (default) or SSE stream.
      content:
        audio/mpeg:
          schema:
            type: string
            format: binary
        audio/wav:
          schema:
            type: string
            format: binary
        audio/opus:
          schema:
            type: string
            format: binary
        audio/aac:
          schema:
            type: string
            format: binary
        audio/flac:
          schema:
            type: string
            format: binary
        audio/pcm:
          schema:
            type: string
            format: binary
        text/event-stream:
          schema:
            type: string
    '401':
      description: Authentication required or invalid credentials.
  operationId: postV1AudioSpeech
