post:
  tags:
    - Inference — Messages
  summary: Anthropic-compatible messages endpoint
  description: Drop-in replacement for `POST https://api.anthropic.com/v1/messages`.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AnthropicMessagesRequest.yaml
        examples:
          basic:
            value:
              model: claude-3-5-sonnet
              max_tokens: 256
              messages:
                - role: user
                  content: Hi there.
  responses:
    '200':
      description: Anthropic Messages response, optionally SSE-streamed.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AnthropicMessagesResponse.yaml
        text/event-stream:
          schema:
            type: string
            description: 'SSE stream of Anthropic event: frames.'
    '400':
      $ref: ../components/responses/BadRequestOpenAI.yaml
    '401':
      $ref: ../components/responses/AuthError.yaml
    '429':
      $ref: ../components/responses/QuotaExceeded.yaml
    5XX:
      $ref: ../components/responses/ProviderError.yaml
  operationId: postV1Messages
