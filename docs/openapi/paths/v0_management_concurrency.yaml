get:
  tags:
    - Management ‚Äî Usage
  summary: Live or historical concurrency buckets
  description: |
    Dual-mode endpoint used by the dashboard to visualize request concurrency.

    ## Modes

    ### live (default)

    Returns currently in-flight requests (where `durationMs IS NULL`),
    grouped by provider and canonical model. Shows requests started within
    the last hour. Useful for real-time dashboard monitoring.

    ### timeline

    Returns bucketed historical counts over a time range, useful for
    historical analysis. Groups by either `provider` or `model`.

    ## Parameters

    - **mode** ‚Äî `live` or `timeline`. Default: `live`.
    - **timeRange** ‚Äî For timeline mode: `hour`, `day`, `week`, `month`,
      or `custom`. Default: `hour`.
    - **groupBy** ‚Äî How to group: `provider` or `model`. Default: `provider`.
      Note: finer granularity (model) may produce more buckets; the adaptive
      algorithm caps at 100 buckets total.
    - **startDate / endDate** ‚Äî For custom time range (ISO timestamps).

    ## Adaptive bucketing

    The endpoint auto-sizes buckets based on the time range to keep bucket
    count between ~20-100 for readable charts. Smaller ranges = finer buckets.

    ## Scoping

    Limited principals see only their own key's concurrency data.
    Admins see all providers/models.
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: mode
      schema:
        type: string
        enum:
          - live
          - timeline
        default: live
      description: >
        `live` = in-flight requests; `timeline` = historical buckets.
    - in: query
      name: timeRange
      schema:
        type: string
        enum:
          - hour
          - day
          - week
          - month
          - custom
        default: hour
      description: Time window for timeline mode.
    - in: query
      name: groupBy
      schema:
        type: string
        enum:
          - provider
          - model
        default: provider
      description: Grouping dimension.
    - in: query
      name: startDate
      schema:
        type: string
        format: date-time
      description: Required when timeRange=custom.
    - in: query
      name: endDate
      schema:
        type: string
        format: date-time
      description: Required when timeRange=custom.
  responses:
    '200':
      description: Bucketed concurrency data.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
                  additionalProperties: true
                  properties:
                    provider:
                      type:
                        - string
                        - 'null'
                    model:
                      type:
                        - string
                        - 'null'
                    count:
                      type: integer
                    timestamp:
                      type: integer
                      description: Epoch ms bucket start (timeline) or "now" (live).
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementConcurrency