get:
  tags:
    - Management — Auth
  summary: Current principal's identity and scoping
  description: |
    Returns the authenticated principal's identity and permissions.

    ## Two response shapes

    **Admin** — Simple response with just `{ role: "admin" }`. Admins have
    full access to all management endpoints.

    **Limited** — Full key metadata including:
    - `keyName` — The key's identifier
    - `allowedProviders` — Array of provider slugs this key can use (empty = all)
    - `allowedModels` — Array of model aliases this key can use (empty = all)
    - `quotaName` — Name of assigned user quota (null = none)
    - `comment` — Freeform description
    - `traceEnabled` — Per-key debug capture state
    - `traceEnabledGlobal` — Global debug state (affects all keys)

    ## traceEnabled vs traceEnabledGlobal

    - `traceEnabledGlobal` — If false, no debug logs are captured for any key
    - `traceEnabled` — Only matters if global is true; enables per-key capture

    To capture debug for a limited key, **both** must be true. This two-tier
    system allows admins to quickly disable all debugging without changing
    per-key settings.

    ## Admin with keyName query

    Admins can also view another key's identity by passing `?keyName=...`.
    This returns the limited-shape response for that key.
  security:
    - AdminKey: []
  parameters:
    - in: query
      name: keyName
      schema:
        type: string
      description: >
        Admin-only: specify a key to inspect instead of the calling principal.
  responses:
    '200':
      description: Principal details.
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                properties:
                  role:
                    type: string
                    const: admin
              - type: object
                properties:
                  role:
                    type: string
                    const: limited
                  keyName:
                    type: string
                  allowedProviders:
                    type: array
                    items:
                      type: string
                  allowedModels:
                    type: array
                    items:
                      type: string
                  quotaName:
                    type:
                      - string
                      - 'null'
                  comment:
                    type:
                      - string
                      - 'null'
                  traceEnabled:
                    type: boolean
                  traceEnabledGlobal:
                    type: boolean
                required:
                  - role
                  - keyName
                  - traceEnabled
                  - traceEnabledGlobal
    '401':
      description: Authentication required or invalid credentials.
  operationId: getV0ManagementSelfMe