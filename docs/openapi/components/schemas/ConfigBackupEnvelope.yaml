type: object
required:
  - plexus_backup
  - version
  - created_at
  - data
properties:
  plexus_backup:
    type: boolean
    const: true
  version:
    type: integer
    description: Schema version for forward-compatible migration.
    const: 1
  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the backup was created.
  dialect:
    type: string
    enum: [sqlite, postgres]
    description: Source database dialect (informational; not used on import).
  data:
    type: object
    description: All configuration tables.
    required:
      - providers
      - models
      - keys
      - user_quotas
      - mcp_servers
      - settings
      - oauth_credentials
    properties:
      providers:
        type: object
        additionalProperties: true
        description: Map of provider slug to provider configuration.
      models:
        type: object
        additionalProperties: true
        description: Map of model alias slug to model configuration.
      keys:
        type: object
        additionalProperties: true
        description: Map of key name to API key configuration.
      user_quotas:
        type: object
        additionalProperties: true
        description: Map of quota name to quota definition.
      mcp_servers:
        type: object
        additionalProperties: true
        description: Map of MCP server name to server configuration.
      settings:
        type: object
        additionalProperties: true
        description: Map of setting key to value.
      oauth_credentials:
        type: array
        items:
          type: object
          required:
            - provider_type
            - account_id
            - access_token
            - refresh_token
            - expires_at
          properties:
            provider_type:
              type: string
            account_id:
              type: string
            access_token:
              type: string
            refresh_token:
              type: string
            expires_at:
              type: number
