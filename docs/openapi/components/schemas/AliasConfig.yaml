type: object
additionalProperties: true
description: Model alias. See `CONFIGURATION.md`.
properties:
  targets:
    type: array
    items:
      type: object
      additionalProperties: true
  type:
    type: string
    enum:
      - chat
      - messages
      - responses
      - gemini
      - embeddings
      - transcriptions
      - speech
      - image
    description: >-
      Inference API type this alias targets.

      - **chat** — OpenAI Chat Completions.
      - **messages** — Anthropic Messages.
      - **responses** — OpenAI Responses API.
      - **gemini** — Google Gemini.
      - **embeddings** — OpenAI Embeddings.
      - **transcriptions** — OpenAI Audio Transcriptions.
      - **speech** — OpenAI Audio Speech.
      - **image** — OpenAI Images generation/edit.
  metadata:
    type: object
    additionalProperties: true
  model_architecture:
    type: object
    additionalProperties: true
  input_price_per_million:
    type: number
  output_price_per_million:
    type: number
  pricing:
    type: object
    additionalProperties: true
  additional_aliases:
    type: array
    items:
      type: string
