type: object
required:
  - secret
additionalProperties: true
description: >
  API key configuration. Controls access to Plexus inference endpoints.
  Stored in the database.
properties:
  secret:
    type: string
    example: sk-0123...
    description: >
      The API key secret. Stored encrypted at rest. Format is typically
      `sk-...` but any string is accepted.
  comment:
    type: string
    description: >
       Freeform description or notes about this key. Max 500 characters.
  expiresInMinutes:
    type: integer
    minimum: 1
    description: >
      Optional lifetime for a new key, expressed as positive whole minutes.
      This value is accepted only when creating the key and cannot be changed.
  expiresAt:
    type: integer
    format: int64
    readOnly: true
    description: Absolute expiry time as Unix epoch milliseconds.
  disabledAt:
    type: integer
    format: int64
    readOnly: true
    description: Time the key was disabled as Unix epoch milliseconds.
  allowedProviders:
    type: array
    items:
      type: string
    description: >
      Restrict this key to specific providers only. If empty, the key
      can be used with any provider.
  excludedProviders:
    type: array
    items:
      type: string
    description: >
      Optional denylist. If set, routing will not use these provider IDs.
  excludedModels:
    type: array
    items:
      type: string
    description: >
      Optional denylist. If set, this key cannot use these model aliases.
  allowedModels:
    type: array
    items:
      type: string
    description: >
      Restrict this key to specific model aliases only. If empty, the
      key can be used with any model.
  allowRawPassthrough:
    type: boolean
    default: false
    description: >
      Privileged provider-wide raw access. Existing provider allow/deny lists
      still apply; model restrictions do not apply to raw requests.
  quota:
    type:
      - string
      - 'null'
    description: >
      Name of a user quota definition to enforce. If null, no quota
      is enforced for this key.
