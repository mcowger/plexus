type: object
description: >-
  Full normalized metadata from an external catalog (OpenRouter, models.dev,
  catwalk). Used by the admin UI to pre-fill override forms.
additionalProperties: true
properties:
  name:
    type: string
    description: Display name from the source catalog.
  description:
    type: string
    description: Model description.
  context_length:
    type: integer
    description: Maximum context window in tokens.
  architecture:
    type: object
    additionalProperties: true
    description: >-
      Modalities and tokenizer information.
      - `input_modalities`: supported input types (text, image, etc.)
      - `output_modalities`: supported output types
      - `tokenizer`: tokenizer family
  pricing:
    type: object
    additionalProperties: true
    description: Price per million tokens (prompt, completion, cache hits).
  supported_parameters:
    type: array
    items:
      type: string
    description: Parameters the model supports (temperature, tools, etc.).
  top_provider:
    type: object
    additionalProperties: true
    description: Details of the primary upstream provider.
