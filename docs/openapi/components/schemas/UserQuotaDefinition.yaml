type: object
required:
  - type
  - limit
  - limitType
properties:
  type:
    type: string
    enum:
      - rolling
      - daily
      - weekly
    description: >-
      Quota window type.

      - **rolling** — Sliding window of `duration` length (e.g. `1h`, `30m`,
        `1d`). Requires the `duration` field.
      - **daily** — Resets at midnight local time each day.
      - **weekly** — 7-day rolling window starting from first request.
  limitType:
    type: string
    enum:
      - requests
      - tokens
    description: >-
      What the quota counts.

      - **requests** — Number of inference requests.
      - **tokens** — Sum of all token fields (`tokensInput` +
        `tokensOutput` + `tokensCached` + `tokensCacheWrite`).
  limit:
    type: number
    minimum: 0
  duration:
    type: string
    description: 'Required for `type: rolling`; e.g. `1h`, `30m`, `1d`.'
    example: 1h
