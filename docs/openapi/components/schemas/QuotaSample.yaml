type: object
properties:
  id:
    type: integer
  provider:
    type: string
  checkerId:
    type: string
  groupId:
    type:
      - string
      - 'null'
  windowType:
    type: string
    enum:
      - subscription
      - hourly
      - five_hour
      - daily
      - weekly
      - monthly
      - custom
    description: >-
      Time window that the quota measurement covers.

      - **subscription** — Monthly/billing-cycle quota or prepaid balance.
      - **hourly** — Hourly rolling window.
      - **five_hour** — 5-hour rolling window (Anthropic).
      - **daily** — Daily reset quota.
      - **weekly** — 7-day rolling window (Anthropic).
      - **monthly** — Calendar month quota.
      - **custom** — Provider-specific window.
  checkedAt:
    type: string
    format: date-time
  limit:
    type: number
  used:
    type: number
  remaining:
    type: number
  utilizationPercent:
    type: number
  unit:
    type: string
    description: e.g. dollars, tokens, requests, percentage.
  resetsAt:
    type:
      - string
      - 'null'
    format: date-time
  status:
    type: string
    enum:
      - ok
      - warning
      - critical
      - exhausted
    description: >-
      Utilisation severity level.

      - **ok** — 0–75% utilisation. Healthy, plenty of quota remaining.
      - **warning** — 75–90% utilisation. Approaching exhaustion.
      - **critical** — 90–100% utilisation. Near exhaustion, take action soon.
      - **exhausted** — 100% utilisation. Quota fully consumed, requests will fail.
  success:
    type: boolean
  errorMessage:
    type:
      - string
      - 'null'
  createdAt:
    type:
      - string
      - 'null'
    format: date-time
