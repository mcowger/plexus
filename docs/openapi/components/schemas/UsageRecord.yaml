type: object
description: >-
  Per-request usage record stored in `request_usage`. Fields with `[null]` may
  be missing on error paths.
properties:
  requestId:
    type: string
    format: uuid
  date:
    type: string
    format: date-time
  startTime:
    type: integer
    description: Epoch ms.
  sourceIp:
    type:
      - string
      - 'null'
  apiKey:
    type:
      - string
      - 'null'
  attribution:
    type:
      - string
      - 'null'
  incomingApiType:
    type: string
    enum:
      - chat
      - messages
      - responses
      - gemini
      - embeddings
      - transcriptions
      - speech
      - images
      - oauth
    description: >-
      API format received from the client.

      - **chat** — OpenAI Chat Completions (`/v1/chat/completions`).
      - **messages** — Anthropic Messages (`/v1/messages`).
      - **responses** — OpenAI Responses API (`/v1/responses`).
      - **gemini** — Google Gemini (`/v1beta/models/*`).
      - **embeddings** — OpenAI Embeddings (`/v1/embeddings`).
      - **transcriptions** — OpenAI Audio Transcriptions (`/v1/audio/transcriptions`).
      - **speech** — OpenAI Audio Speech (`/v1/audio/speech`).
      - **images** — OpenAI Images (`/v1/images/*`).
      - **oauth** — OAuth-authenticated provider session.
  provider:
    type:
      - string
      - 'null'
  attemptCount:
    type: integer
  retryHistory:
    type:
      - string
      - 'null'
    description: JSON-encoded retry chain.
  incomingModelAlias:
    type:
      - string
      - 'null'
  canonicalModelName:
    type:
      - string
      - 'null'
  selectedModelName:
    type:
      - string
      - 'null'
  finalAttemptProvider:
    type:
      - string
      - 'null'
  finalAttemptModel:
    type:
      - string
      - 'null'
  allAttemptedProviders:
    type:
      - string
      - 'null'
    description: JSON array string.
  outgoingApiType:
    type:
      - string
      - 'null'
  tokensInput:
    type:
      - integer
      - 'null'
  tokensOutput:
    type:
      - integer
      - 'null'
  tokensReasoning:
    type:
      - integer
      - 'null'
  tokensCached:
    type:
      - integer
      - 'null'
  tokensCacheWrite:
    type:
      - integer
      - 'null'
  tokensEstimated:
    type:
      - integer
      - 'null'
    description: 1 when token counts were estimated.
  costInput:
    type:
      - number
      - 'null'
  costOutput:
    type:
      - number
      - 'null'
  costCached:
    type:
      - number
      - 'null'
  costCacheWrite:
    type:
      - number
      - 'null'
  costTotal:
    type:
      - number
      - 'null'
  costSource:
    type:
      - string
      - 'null'
    enum:
      - default
      - simple
      - openrouter
      - defined
      - per_request
      - null
    description: >-
      Pricing method used to calculate cost fields.

      - **default** — No pricing configured; all cost fields are zero.
      - **simple** — Per-token pricing from `input_price_per_million` /
        `output_price_per_million` on the model.
      - **openrouter** — Pricing fetched from OpenRouter at request time.
      - **defined** — Explicit pricing ranges from `pricing.range` in model
        config.
      - **per_request** — Flat fee per call; full amount in `costInput`,
        others zero.
  costMetadata:
    type:
      - string
      - 'null'
    description: JSON-encoded pricing detail.
  durationMs:
    type:
      - integer
      - 'null'
  ttftMs:
    type:
      - integer
      - 'null'
  tokensPerSec:
    type:
      - number
      - 'null'
  kwhUsed:
    type:
      - number
      - 'null'
  isStreamed:
    type: boolean
  isPassthrough:
    type: boolean
  responseStatus:
    type: string
    enum:
      - success
      - error
      - pending
    description: >-
      Outcome of the request.

      - **success** — Upstream returned a successful response.
      - **error** — Upstream returned an error or the request failed.
      - **pending** — Request is in-flight (used for async tracking).
  toolsDefined:
    type:
      - integer
      - 'null'
  messageCount:
    type:
      - integer
      - 'null'
  parallelToolCallsEnabled:
    type:
      - boolean
      - 'null'
  toolCallsCount:
    type:
      - integer
      - 'null'
  finishReason:
    type:
      - string
      - 'null'
  hasDebug:
    type: boolean
  hasError:
    type: boolean
