  /v0/management/usage:
    get:
      tags:
        - Management — Usage
      summary: List usage records
      description: |
        Filterable, paginated, optionally-projected listing of request-level
        usage records. Limited principals are force-scoped to their own
        `apiKey`, regardless of query parameters.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - date
              - apiKey
              - provider
              - incomingModelAlias
              - costTotal
              - durationMs
            default: date
        - in: query
          name: sortDir
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
        - in: query
          name: apiKey
          schema:
            type: string
        - in: query
          name: attribution
          schema:
            type: string
        - in: query
          name: incomingApiType
          schema:
            type: string
        - in: query
          name: provider
          schema:
            type: string
        - in: query
          name: incomingModelAlias
          schema:
            type: string
        - in: query
          name: selectedModelName
          schema:
            type: string
        - in: query
          name: outgoingApiType
          schema:
            type: string
        - in: query
          name: responseStatus
          schema:
            type: string
            enum:
              - success
              - error
        - in: query
          name: minDurationMs
          schema:
            type: integer
        - in: query
          name: maxDurationMs
          schema:
            type: integer
        - in: query
          name: fields
          schema:
            type: string
          description: |
            Comma-separated projection (e.g. `requestId,date,costTotal`). Unknown field
            names are silently dropped. When unset, all fields are returned.
      responses:
        "200":
          description: Paginated usage records.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UsageRecord"
                  total:
                    type: integer
                required:
                  - data
                  - total
        "401":
          description: Authentication required or invalid credentials.
      operationId: getV0ManagementUsage
    delete:
      tags:
        - Management — Usage
      summary: Delete usage records (admin only)
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: olderThanDays
          schema:
            type: integer
          description: Only delete records older than N days. Omit to delete everything.
      responses:
        "200":
          $ref: "#/components/responses/SuccessTrue"
        "401":
          description: Authentication required or invalid credentials.
      operationId: deleteV0ManagementUsage
  /v0/management/usage/summary:
    get:
      tags:
        - Management — Usage
      summary: Aggregated usage time-series and totals
      description: |
        Returns bucketed series plus 7-day and since-midnight rollups.
        Limited principals see only their own key's data.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum:
              - hour
              - day
              - week
              - month
              - custom
            default: day
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          description: Required with `range=custom`.
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
          description: Required with `range=custom`.
      responses:
        "200":
          description: Aggregates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"
        "400":
          description: Invalid `range` or custom-range parameters.
      operationId: getV0ManagementUsageSummary
  /v0/management/usage/{requestId}:
    parameters:
      - in: path
        name: requestId
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - Management — Usage
      summary: Delete a single usage record (admin only)
      security:
        - AdminKey: []
      responses:
        "200":
          $ref: "#/components/responses/SuccessTrue"
        "404":
          description: Not found.
      operationId: deleteV0ManagementUsageByrequestId
  /v0/management/concurrency:
    get:
      tags:
        - Management — Usage
      summary: Live or historical concurrency buckets
      description: |
        Dual-mode endpoint used by the dashboard:

        - `mode=live` (default) — currently in-flight requests
          (`durationMs IS NULL`), grouped by provider and canonical model,
          over the last hour.
        - `mode=timeline` — bucketed counts over `timeRange` (or a
          `startDate`/`endDate` custom window), grouped by either
          `provider` or `model`. Adaptive bucketing caps at 100 buckets.
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: mode
          schema:
            type: string
            enum:
              - live
              - timeline
            default: live
        - in: query
          name: timeRange
          schema:
            type: string
            enum:
              - hour
              - day
              - week
              - month
              - custom
            default: hour
        - in: query
          name: groupBy
          schema:
            type: string
            enum:
              - provider
              - model
            default: provider
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Bucketed counts (shape depends on mode).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
