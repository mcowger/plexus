      operationId: patchV0ManagementUserquotasByname
    delete:
      tags:
        - Management — Quotas (User)
      summary: Delete a quota definition (admin only)
      description: Returns 409 if any configured key still references this quota.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  name:
                    type: string
                  message:
                    type: string
        "404":
          description: Not found.
        "409":
          description: Quota still in use.
      operationId: deleteV0ManagementUserquotasByname
  /v0/management/quota/clear:
    post:
      tags:
        - Management — Quotas (User)
      summary: Reset a key's quota counters (admin only)
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
              required:
                - key
      responses:
        "200":
          description: Reset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  key:
                    type: string
                  message:
                    type: string
        "400":
          description: Missing `key`.
      operationId: postV0ManagementQuotaClear
  /v0/management/quota/status/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
    get:
      tags:
        - Management — Quotas (User)
      summary: Current enforcement status for a key (admin only)
      security:
        - AdminKey: []
      responses:
        "200":
          description: Status. `quota_name` is `null` when no quota is assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaStatus"
              examples:
                assigned:
                  value:
                    key: acme_corp
                    quota_name: premium_hourly
                    allowed: true
                    current_usage: 45000
                    limit: 100000
                    remaining: 55000
                    resets_at: 2026-02-19T01:00:00.000Z
                unassigned:
                  value:
                    key: free_user
                    quota_name: null
                    allowed: true
                    current_usage: 0
                    limit: null
                    remaining: null
                    resets_at: null
        "404":
          description: Key not found.
      operationId: getV0ManagementQuotaStatusBykey
  /v0/management/test:
    post:
      tags:
        - Management — Test
      summary: Synthetic test inference (admin only)
      description: |
        Runs a short inference request directly against a (provider, model)
        pair, bypassing alias resolution. Used by the admin UI's "test"
        button next to each alias target.
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                model:
                  type: string
                apiType:
                  type: string
                  enum:
                    - chat
                    - messages
                    - gemini
                    - responses
                    - embeddings
                    - images
                    - speech
                    - oauth
                  default: chat
              required:
                - provider
                - model
      responses:
        "200":
          description: Test outcome. `success=false` still returns 200 with an error message so the UI can render it.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  durationMs:
                    type: integer
                  apiType:
                    type: string
                  response:
                    type: string
                  error:
                    type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV0ManagementTest
  /v0/management/restart:
    post:
      tags:
        - Management — Restart
      summary: Gracefully restart the process (admin only)
      description: |
        Closes Fastify and exits with status 0. The process manager (systemd,
        Docker, PM2, etc.) is responsible for restarting the binary. The
        response is sent before the shutdown begins.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Restart acknowledged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
                  message:
                    type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV0ManagementRestart
  /v0/management/events:
    get:
      tags:
        - Events
      summary: Live usage event stream
      description: |
        Emits `started`, `updated`, `completed` (and legacy `created`) events
        as requests progress through the dispatcher. Sends `ping` every 10s.
        Limited principals see only events for their own key.

        ```
        event: completed
        data: { ...UsageRecord... }
        id: 1735689599000
        ```
      security:
        - AdminKey: []
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: getV0ManagementEvents
  /v0/system/logs/stream:
    get:
      tags:
        - Events
      summary: Live backend log stream (admin only)
      description: |
        All backend log lines are serialized into `syslog` events, plus a
        `ping` every 10s.

        ```
        event: syslog
        data: { "level": "info", "message": "...", "timestamp": "..." }
        ```
      security:
        - AdminKey: []
      responses:
        "200":
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: getV0SystemLogsStream
  /mcp/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
          pattern: ^[a-z0-9][a-z0-9-_]{1,62}$
        description: The `mcp_servers` key from config.
    post:
      tags:
        - MCP Proxy
      summary: JSON-RPC message exchange
      description: |
        Forwards the JSON-RPC body to the configured upstream MCP server.
        Client `Authorization` / `x-api-key` headers are **not** forwarded;
        only the static `headers` in the server's config are used upstream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: JSON-RPC 2.0 request object.
      responses:
        "200":
          description: JSON-RPC response (possibly streamed).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid server name.
        "404":
          description: Server not found or disabled.
        "502":
          description: Upstream error.
        "504":
          description: Upstream timeout.
      operationId: postMcpByname
    get:
      tags:
        - MCP Proxy
      summary: SSE stream to the upstream MCP server
      responses:
        "200":
          description: Event stream.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: getMcpByname
    delete:
      tags:
        - MCP Proxy
      summary: Upstream session termination
      responses:
        "200":
          description: Success.
        "204":
          description: No content.
        "401":
          description: Authentication required or invalid credentials.
      operationId: deleteMcpByname
  /.well-known/oauth-authorization-server:
    get:
      tags:
        - MCP Proxy
      summary: OAuth 2.0 authorization server metadata (public)
      security: []
      responses:
        "200":
          description: Metadata indicating bearer auth.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Bad request.
      operationId: getWellknownOauthauthorizationserver
  /.well-known/oauth-protected-resource:
    get:
      tags:
        - MCP Proxy
      summary: OAuth 2.0 protected resource metadata (public)
      security: []
      responses:
        "200":
          description: Metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Bad request.
      operationId: getWellknownOauthprotectedresource
  /.well-known/openid-configuration:
    get:
      tags:
        - MCP Proxy
      summary: OpenID Connect discovery (public)
      security: []
      responses:
        "200":
          description: OIDC discovery document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Bad request.
      operationId: getWellknownOpenidconfiguration
  /register:
    post:
      tags:
        - MCP Proxy
      summary: Dynamic MCP client registration (public, static response)
      security: []
      responses:
        "201":
          description: Static registration record pointing callers to Bearer auth.
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                    const: plexus-mcp-static
                  client_id_issued_at:
                    type: integer
                  client_secret:
                    type: string
                  grant_types:
                    type: array
                    items:
                      type: string
                  token_endpoint_auth_method:
                    type: string
        "400":
          description: Bad request.
      operationId: postRegister
components:
  securitySchemes:
    PlexusApiKey:
      type: http
      scheme: bearer
      description: |
        Plexus API key. The server also accepts the same value in
        `x-api-key`, `x-goog-api-key`, or the `?key=` query string.
        Suffix the key with `:label` (e.g. `sk-abc:copilot`) to attach a
        dynamic attribution label.
    AdminKey:
      type: apiKey
      in: header
      name: x-admin-key
      description: |
        Either the server's `ADMIN_KEY` (full admin access) or the plaintext
        secret of a configured API key (limited access, scoped to that key).
  parameters:
    ResponseId:
      in: path
      name: response_id
      required: true
      schema:
        type: string
        example: resp_01HXYZ...
  responses:
    SuccessTrue:
      description: Success.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessTrue"
    AuthError:
      description: Missing or invalid Plexus API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthErrorBody"
    AdminAuthError:
      description: Missing or invalid `x-admin-key`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthErrorBody"
    BadRequestOpenAI:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIError"
    NotFoundOpenAI:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIError"
    ValidationError:
      description: Body failed schema validation.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                const: Validation failed
              details:
                type: array
                items:
                  type: object
                  additionalProperties: true
    QuotaExceeded:
      description: User quota exceeded.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  message:
                    type: string
                  type:
                    type: string
                    const: quota_exceeded
                  quota_name:
                    type: string
                  current_usage:
                    type: number
                  limit:
                    type: number
                  resets_at:
                    type: string
                    format: date-time
          example:
            error:
              message: "Quota exceeded: premium_hourly limit of 100000 reached"
              type: quota_exceeded
              quota_name: premium_hourly
              current_usage: 125671
              limit: 100000
              resets_at: 2026-02-19T01:00:00.000Z
    ProviderError:
      description: Upstream provider returned an error or the dispatcher exhausted retries.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenAIError"
  schemas:
    SuccessTrue:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required:
        - success
    SaveSlugResult:
      type: object
      properties:
        success:
          type: boolean
          const: true
        slug:
          type: string
      required:
        - success
        - slug
    OpenAIError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              example: invalid_request_error
            code:
              type:
                - string
                - integer
                - "null"
            param:
              type:
                - string
                - "null"
            routing_context:
              type: object
              description: Plexus-specific routing metadata attached when a dispatcher retry chain fails.
              additionalProperties: true
          required:
            - message
            - type
      required:
        - error
    AuthErrorBody:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              enum:
                - auth_error
                - forbidden
            code:
              type: integer
          required:
            - message
            - type
            - code
      required:
        - error
    ChatCompletionRequest:
      description: OpenAI Chat Completions request (pass-through; full OpenAI schema accepted).
      type: object
      additionalProperties: true
      required:
        - model
        - messages
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
                  - tool
                  - function
              content: {}
              name:
                type: string
              tool_call_id:
                type: string
              tool_calls:
                type: array
                items:
                  type: object
                  additionalProperties: true
        stream:
          type: boolean
          default: false
        temperature:
          type: number
        top_p:
          type: number
        max_tokens:
          type: integer
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
        tool_choice:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        parallel_tool_calls:
          type: boolean
        response_format:
          type: object
          additionalProperties: true
        seed:
          type: integer
        user:
          type: string
    ChatCompletionResponse:
      description: OpenAI Chat Completions response (pass-through).
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        object:
          type: string
          const: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              index:
                type: integer
              message:
                type: object
                additionalProperties: true
                properties:
                  role:
                    type: string
                  content:
                    type:
                      - string
                      - "null"
              finish_reason:
                type: string
        usage:
          type: object
          additionalProperties: true
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
    AnthropicMessagesRequest:
      description: Anthropic Messages request (pass-through; full Anthropic schema accepted).
      type: object
      additionalProperties: true
      required:
        - model
        - messages
        - max_tokens
      properties:
        model:
          type: string
        max_tokens:
          type: integer
        system: {}
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - user
                  - assistant
              content: {}
        stream:
          type: boolean
        temperature:
          type: number
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
    AnthropicMessagesResponse:
      description: Anthropic Messages response (pass-through).
      type: object
      additionalProperties: true
    ResponsesRequest:
      description: OpenAI Responses API request.
      type: object
      additionalProperties: true
      required:
        - model
      properties:
        model:
          type: string
        input: {}
        instructions:
          type: string
        previous_response_id:
          type: string
        conversation:
          oneOf:
            - type: string
            - type: object
              properties:
                id:
                  type: string
              required:
                - id
        store:
          type: boolean
          default: true
        stream:
          type: boolean
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
        tool_choice: {}
        parallel_tool_calls:
          type: boolean
        prompt_cache_key:
          type: string
    ResponsesResponse:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          example: resp_01HXYZ
        object:
          type: string
          const: response
        created_at:
          type: integer
        model:
          type: string
        status:
          type: string
        output:
          type: array
          items:
            type: object
            additionalProperties: true
        usage:
          type: object
          additionalProperties: true
    GeminiGenerateContentRequest:
      description: Google `generateContent` request body.
      type: object
      additionalProperties: true
      required:
        - contents
      properties:
        contents:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              parts:
                type: array
                items:
                  type: object
                  additionalProperties: true
        system_instruction:
          type: object
          additionalProperties: true
        generationConfig:
          type: object
          additionalProperties: true
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
    GeminiGenerateContentResponse:
      type: object
      additionalProperties: true
    EmbeddingsRequest:
      type: object
      additionalProperties: true
      required:
        - model
        - input
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: array
              items:
                type: array
                items:
                  type: integer
        dimensions:
          type: integer
        encoding_format:
          type: string
          enum:
            - float
            - base64
        user:
          type: string
    EmbeddingsResponse:
      type: object
      additionalProperties: true
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
                const: embedding
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer
    TranscriptionRequest:
      type: object
      required:
        - file
        - model
      properties:
        file:
          type: string
          format: binary
        model:
          type: string
        language:
          type: string
        prompt:
          type: string
        response_format:
          type: string
          enum:
            - json
            - text
          default: json
        temperature:
          type: number
    SpeechRequest:
      type: object
      required:
        - model
        - input
        - voice
      properties:
        model:
          type: string
        input:
          type: string
          maxLength: 4096
        voice:
          type: string
          enum:
            - alloy
            - ash
            - ballad
            - coral
            - echo
            - fable
            - onyx
            - nova
            - sage
            - shimmer
            - verse
            - marin
            - cedar
        instructions:
          type: string
          description: Voice style; not supported on tts-1 / tts-1-hd.
        response_format:
          type: string
          enum:
            - mp3
            - opus
            - aac
            - flac
            - wav
            - pcm
          default: mp3
        speed:
          type: number
          minimum: 0.25
          maximum: 4
          default: 1
        stream_format:
          type: string
          enum:
            - sse
            - audio
          default: audio
          description: Not supported on tts-1 / tts-1-hd.
    ImageGenerationRequest:
      type: object
      required:
        - model
        - prompt
      properties:
        model:
          type: string
        prompt:
          type: string
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
        size:
          type: string
          enum:
            - 256x256
            - 512x512
            - 1024x1024
            - 1792x1024
            - 1024x1792
        response_format:
          type: string
          enum:
            - url
            - b64_json
          default: url
        quality:
          type: string
          enum:
            - standard
            - hd
            - high
            - medium
            - low
        style:
          type: string
          enum:
            - vivid
            - natural
        user:
          type: string
    ImageEditRequest:
      type: object
      required:
        - image
        - prompt
      properties:
        image:
          type: string
          format: binary
          description: PNG file < 4 MB.
        prompt:
          type: string
        mask:
          type: string
          format: binary
          description: PNG where transparent pixels mark editable regions.
        model:
          type: string
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
        size:
          type: string
          enum:
            - 256x256
            - 512x512
            - 1024x1024
          default: 1024x1024
        response_format:
          type: string
          enum:
            - url
            - b64_json
          default: url
        quality:
          type: string
          enum:
            - standard
            - high
            - medium
            - low
        user:
          type: string
    ImageResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              url:
                type: string
                format: uri
              b64_json:
                type: string
              revised_prompt:
                type: string
      required:
        - created
        - data
    ModelList:
      type: object
      required:
        - object
        - data
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelListEntry"
    ModelListEntry:
      type: object
      required:
        - id
        - object
        - created
        - owned_by
      properties:
        id:
          type: string
        object:
          type: string
          const: model
        created:
          type: integer
          description: Epoch seconds.
        owned_by:
          type: string
          const: plexus
        name:
          type: string
        description:
          type: string
        context_length:
          type: integer
        architecture:
          type: object
          additionalProperties: true
        pricing:
          type: object
          additionalProperties: true
          properties:
            prompt:
              type: string
            completion:
              type: string
            input_cache_read:
              type: string
        supported_parameters:
          type: array
          items:
            type: string
        top_provider:
          type: object
          additionalProperties: true
          properties:
            context_length:
              type: integer
            max_completion_tokens:
              type: integer
    NormalizedModelMetadata:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        description:
          type: string
        context_length:
          type: integer
        architecture:
          type: object
          additionalProperties: true
        pricing:
          type: object
          additionalProperties: true
        supported_parameters:
          type: array
          items:
            type: string
        top_provider:
          type: object
          additionalProperties: true
    Config:
      type: object
      description: Full in-memory Plexus configuration. Mirrors the `plexus.yaml` schema.
      additionalProperties: true
      properties:
        providers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ProviderConfig"
        models:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AliasConfig"
        keys:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/KeyConfig"
        mcp_servers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/McpServerConfig"
        user_quotas:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/UserQuotaDefinition"
        quotas:
          type: array
          items:
            type: object
            additionalProperties: true
        system_settings:
          type: object
          additionalProperties: true
    ProviderConfig:
      type: object
      additionalProperties: true
      description: See `CONFIGURATION.md` for the full provider schema.
      properties:
        type:
          type: string
          description: e.g. openai, anthropic, gemini, openrouter, oauth/…
