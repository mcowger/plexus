openapi: 3.1.0
info:
  title: Plexus API
  version: "0"
  summary: Unified gateway for LLM provider APIs with usage tracking, quotas, cooldowns, and an admin management plane.
  description: |
    Plexus exposes three logical surfaces:

    1. **Inference APIs** (`/v1/*`, `/v1beta/*`) — OpenAI-, Anthropic-, and Gemini-
       compatible endpoints that transparently fan out to configured upstream
       providers. Authenticated with a Plexus API key (see the
       [`PlexusApiKey`](#/components/securitySchemes/PlexusApiKey) security scheme).

    2. **Management APIs** (`/v0/management/*`) — Administrative operations
       (configuration CRUD, usage analytics, debug tracing, quotas, OAuth
       onboarding, Prometheus metrics, etc.). Authenticated with the
       `x-admin-key` header. The admin header may be either the server's
       `ADMIN_KEY` (full access) or the plaintext secret of a configured
       API key (limited access, scoped to that key's own data). Endpoints
       marked with the `AdminOnly` note reject limited principals with 403.

    3. **MCP Proxy** (`/mcp/:name`) — Proxies JSON-RPC and SSE traffic to
       database-registered MCP servers. Plus unauthenticated MCP OAuth
       discovery under `/.well-known/*` and `POST /register`.

    ## Authentication

    ### Inference (`PlexusApiKey`)

    A Plexus API key is accepted from any of the following, checked in order:

    | Location | Example |
    |---|---|
    | `Authorization` header (Bearer) | `Authorization: Bearer sk-my-key` |
    | `Authorization` header (no prefix) | `Authorization: sk-my-key` (server prepends `Bearer`) |
    | `x-api-key` header | `x-api-key: sk-my-key` |
    | `x-goog-api-key` header | `x-goog-api-key: sk-my-key` |
    | `?key=` query parameter | `GET /v1/models?key=sk-my-key` |

    Keys are matched against the `secret` field of entries in the `keys`
    configuration table. Append `:label` to a key to tag every resulting
    usage record with an `attribution` label (e.g. `sk-abc:copilot`).

    ### Management (`AdminKey`)

    Pass the header `x-admin-key: <value>`. A successful match with
    `process.env.ADMIN_KEY` produces an `admin` principal. Any other value
    is checked against `keys[*].secret` — a match yields a `limited`
    principal scoped to its own key's usage/debug/error records. Limited
    principals are rejected (403) from endpoints documented as admin-only.

    Use `GET /v0/management/auth/verify` to test a candidate admin/key
    credential before storing it in the dashboard.

    ## Public endpoints (no auth)

    - `GET /health`
    - `GET /v1/models`
    - `GET /v1/openrouter/models`
    - `GET /v1/metadata/search`
    - `GET /v1/metadata/lookup`
    - All `/.well-known/*` MCP discovery endpoints
    - `POST /register` (MCP dynamic client registration)
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:4000
    description: Local dev server (default port)
  - url: "{protocol}://{host}"
    description: Custom deployment
    variables:
      protocol:
        default: https
        enum:
          - http
          - https
      host:
        default: plexus.example.com
tags:
  - name: Health
    description: Liveness probe.
  - name: Inference — Chat
    description: OpenAI Chat Completions compatible.
  - name: Inference — Messages
    description: Anthropic Messages compatible.
  - name: Inference — Responses
    description: OpenAI Responses API compatible (stateful, tool-using).
  - name: Inference — Gemini
    description: Google Gemini `generateContent` / `streamGenerateContent` compatible.
  - name: Inference — Embeddings
    description: OpenAI Embeddings compatible.
  - name: Inference — Audio
    description: OpenAI Audio speech and transcription compatible.
  - name: Inference — Images
    description: OpenAI Images generation and edit compatible.
  - name: Inference — Models
    description: Model and catalog discovery.
  - name: Management — Auth
    description: Admin-key verification and self-service identity.
  - name: Management — Config
    description: Providers, aliases, keys, system settings, MCP servers.
  - name: Management — Usage
    description: Request-level usage records and time-series aggregates.
  - name: Management — Debug
    description: Per-request debug capture toggles and logs.
  - name: Management — Errors
    description: Inference error log storage.
  - name: Management — MCP Logs
    description: Usage records for the MCP proxy.
  - name: Management — Cooldowns
    description: Provider/model cooldown state.
  - name: Management — Performance
    description: TTFT / throughput aggregates per (provider, model).
  - name: Management — Metrics
    description: Prometheus scrape endpoint.
  - name: Management — Logging
    description: Runtime log-level control.
  - name: Management — OAuth
    description: Per-provider OAuth onboarding sessions (pi-ai).
  - name: Management — Quotas (Provider)
    description: Upstream provider quota checkers (`checkerId`-based).
  - name: Management — Quotas (User)
    description: Per-API-key quota definitions and enforcement.
  - name: Management — Test
    description: Synthetic inference request used by the admin UI.
  - name: Management — Restart
    description: Graceful process restart.
  - name: Management — Models
    description: External model metadata helpers (HuggingFace).
  - name: Events
    description: Server-Sent Event streams.
  - name: MCP Proxy
    description: JSON-RPC/SSE proxy for configured MCP servers plus OAuth discovery.
security:
  - PlexusApiKey: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200/OK while the process is accepting traffic. Used by container orchestrators.
      security: []
      responses:
        "200":
          description: Server is healthy.
          content:
            text/plain:
              schema:
                type: string
                const: OK
        "400":
          description: Bad request.
      operationId: getHealth
  /v1/chat/completions:
    post:
      tags:
        - Inference — Chat
      summary: OpenAI-compatible chat completion
      description: |
        Drop-in replacement for `POST https://api.openai.com/v1/chat/completions`.
        The full OpenAI request schema is accepted as-is; routing to the
        configured upstream provider is driven by the `model` field.
        Forwarded client headers of note: `x-app` (optional, echoed into usage
        `plexus_metadata.clientHeaders`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
            examples:
              simple:
                summary: Minimal non-streaming call
                value:
                  model: fast-model
                  messages:
                    - role: user
                      content: Say hello.
              streaming:
                summary: Streaming call
                value:
                  model: smart-model
                  stream: true
                  messages:
                    - role: system
                      content: You are terse.
                    - role: user
                      content: List 3 primes.
      responses:
        "200":
          description: |
            A non-streamed JSON response or, when `stream: true`,
            a `text/event-stream` of `data: {...}` frames terminated by
            `data: [DONE]`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
                description: SSE frames of Chat Completions deltas.
        "400":
          $ref: "#/components/responses/BadRequestOpenAI"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        5XX:
          $ref: "#/components/responses/ProviderError"
      operationId: postV1ChatCompletions
  /v1/messages:
    post:
      tags:
        - Inference — Messages
      summary: Anthropic-compatible messages endpoint
      description: Drop-in replacement for `POST https://api.anthropic.com/v1/messages`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessagesRequest"
            examples:
              basic:
                value:
                  model: claude-3-5-sonnet
                  max_tokens: 256
                  messages:
                    - role: user
                      content: Hi there.
      responses:
        "200":
          description: Anthropic Messages response, optionally SSE-streamed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicMessagesResponse"
            text/event-stream:
              schema:
                type: string
                description: "SSE stream of Anthropic event: frames."
        "400":
          $ref: "#/components/responses/BadRequestOpenAI"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        5XX:
          $ref: "#/components/responses/ProviderError"
      operationId: postV1Messages
  /v1/responses:
    post:
      tags:
        - Inference — Responses
      summary: Create a Responses API response
      description: |
        OpenAI Responses API compatible. Plexus supports multi-turn continuation
        via `previous_response_id` or `conversation` — it loads the prior output
        items server-side so the client only needs to send the new input.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
            examples:
              first_turn:
                summary: Fresh response with simple string input
                value:
                  model: smart-model
                  input: Explain quantum tunneling in one sentence.
              continued:
                summary: Continue a prior response
                value:
                  model: smart-model
                  previous_response_id: resp_01H...
                  input: Now translate that to Spanish.
      responses:
        "200":
          description: A Responses API response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
            text/event-stream:
              schema:
                type: string
                description: Responses API SSE stream.
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          description: Referenced `previous_response_id` or `conversation` not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenAIError"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        5XX:
          $ref: "#/components/responses/ProviderError"
      operationId: postV1Responses
  /v1/codex/responses:
    post:
      tags:
        - Inference — Responses
      summary: Alias of `/v1/responses` for the OpenAI Codex CLI
      description: Identical behaviour to `POST /v1/responses`. Exists because the Codex CLI hard-codes this path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
      responses:
        "200":
          description: See `/v1/responses`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1CodexResponses
  /v1/responses/{response_id}:
    parameters:
      - $ref: "#/components/parameters/ResponseId"
    get:
      tags:
        - Inference — Responses
      summary: Retrieve a stored response
      responses:
        "200":
          description: Stored response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
        "404":
          $ref: "#/components/responses/NotFoundOpenAI"
      operationId: getV1ResponsesByresponseid
    delete:
      tags:
        - Inference — Responses
      summary: Delete a stored response
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    const: true
                  id:
                    type: string
                required:
                  - deleted
                  - id
        "404":
          $ref: "#/components/responses/NotFoundOpenAI"
      operationId: deleteV1ResponsesByresponseid
  /v1/conversations/{conversation_id}:
    parameters:
      - in: path
        name: conversation_id
        required: true
        schema:
          type: string
    get:
      tags:
        - Inference — Responses
      summary: Retrieve a stored conversation
      responses:
        "200":
          description: Conversation with its stored items.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  id:
                    type: string
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFoundOpenAI"
      operationId: getV1ConversationsByconversationid
  /v1beta/models/{modelWithAction}:
    parameters:
      - in: path
        name: modelWithAction
        required: true
        schema:
          type: string
          example: gemini-2.5-flash:generateContent
        description: |
          Google-style `{model}:{action}` path parameter. `action` must be one
          of `generateContent` or `streamGenerateContent`. Example:
          `gemini-2.5-flash:streamGenerateContent`.
    post:
      tags:
        - Inference — Gemini
      summary: Gemini `generateContent` / `streamGenerateContent`
      description: Accepts Google's Generative Language API request body; Plexus transforms to the upstream provider and back.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiGenerateContentRequest"
            examples:
              basic:
                value:
                  contents:
                    - role: user
                      parts:
                        - text: Summarize photosynthesis.
      responses:
        "200":
          description: Gemini response (JSON or SSE).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiGenerateContentResponse"
            text/event-stream:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1betaModelsBymodelWithAction
  /v1/embeddings:
    post:
      tags:
        - Inference — Embeddings
      summary: OpenAI-compatible embeddings (always pass-through)
      description: |
        Requires a model configured with `type: embeddings`. The request and
        response are forwarded verbatim.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingsRequest"
            examples:
              basic:
                value:
                  model: text-embedding-3-small
                  input:
                    - Hello world
      responses:
        "200":
          description: Embeddings response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsResponse"
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1Embeddings
  /v1/audio/transcriptions:
    post:
      tags:
        - Inference — Audio
      summary: OpenAI-compatible audio transcription
      description: |
        `multipart/form-data`. Max upload 25 MB. Supported MIME types include
        `audio/mpeg`, `audio/mp4`, `audio/wav`, `audio/ogg`, `audio/webm`,
        `audio/flac`. Pass-through to the provider.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TranscriptionRequest"
      responses:
        "200":
          description: Transcription in `json` or `text` format.
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                required:
                  - text
            text/plain:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1AudioTranscriptions
  /v1/audio/speech:
    post:
      tags:
        - Inference — Audio
      summary: OpenAI-compatible text-to-speech
      description: |
        Generates audio from text. Pass-through to the provider. Returns binary
        audio by default; set `stream_format: "sse"` to receive
        `speech.audio.delta` / `speech.audio.done` events instead (not
        supported on `tts-1`/`tts-1-hd`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeechRequest"
            examples:
              basic:
                value:
                  model: tts-1
                  input: Hello world.
                  voice: alloy
      responses:
        "200":
          description: Binary audio (default) or SSE stream.
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            audio/opus:
              schema:
                type: string
                format: binary
            audio/aac:
              schema:
                type: string
                format: binary
            audio/flac:
              schema:
                type: string
                format: binary
            audio/pcm:
              schema:
                type: string
                format: binary
            text/event-stream:
              schema:
                type: string
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1AudioSpeech
  /v1/images/generations:
    post:
      tags:
        - Inference — Images
      summary: OpenAI-compatible image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageGenerationRequest"
            examples:
              basic:
                value:
                  model: dall-e-3
                  prompt: A tiny red square on a white background.
                  size: 1024x1024
      responses:
        "200":
          description: Generated images.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResponse"
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1ImagesGenerations
  /v1/images/edits:
    post:
      tags:
        - Inference — Images
      summary: OpenAI-compatible image edit (multipart)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImageEditRequest"
      responses:
        "200":
          description: Edited images.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageResponse"
        "401":
          description: Authentication required or invalid credentials.
      operationId: postV1ImagesEdits
  /v1/models:
    get:
      tags:
        - Inference — Models
      summary: List configured aliases (public)
      description: |
        Returns all configured model aliases. If an alias has a `metadata`
        block, the response includes enriched OpenRouter-style fields.
      security: []
      responses:
        "200":
          description: Alias list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
              example:
                object: list
                data:
                  - id: fast-model
                    object: model
                    created: 1748000000
                    owned_by: plexus
                    name: "OpenAI: GPT-4.1 Nano"
                    description: GPT-4.1 Nano is a lightweight model for fast tasks.
                    context_length: 1000000
                    architecture:
                      input_modalities:
                        - text
                        - image
                      output_modalities:
                        - text
                      tokenizer: GPT
                    pricing:
                      prompt: "0.0000001"
                      completion: "0.0000004"
                      input_cache_read: "0.000000025"
                    supported_parameters:
                      - temperature
                      - tools
                      - tool_choice
                      - max_tokens
                    top_provider:
                      context_length: 1000000
                      max_completion_tokens: 32768
                  - id: plain-model
                    object: model
                    created: 1748000000
                    owned_by: plexus
        "400":
          description: Bad request.
      operationId: getV1Models
  /v1/openrouter/models:
    get:
      tags:
        - Inference — Models
      summary: OpenRouter model slugs known to Plexus (public)
      description: Requires that the OpenRouter pricing catalog has been loaded at startup.
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Optional substring filter applied to slug names.
      responses:
        "200":
          description: Slug list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                required:
                  - data
                  - count
        "400":
          description: Bad request.
        "503":
          description: Pricing catalog has not loaded yet.
      operationId: getV1OpenrouterModels
  /v1/metadata/search:
    get:
      tags:
        - Inference — Models
      summary: Search a loaded metadata catalog (public)
      description: Used by the admin UI to autocomplete metadata references on a model alias.
      security: []
      parameters:
        - in: query
          name: source
          required: true
          schema:
            type: string
            enum:
              - openrouter
              - models.dev
              - catwalk
        - in: query
          name: q
          schema:
            type: string
          description: Substring filter. Omit to return the first `limit` entries.
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
            minimum: 1
      responses:
        "200":
          description: Matches.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                      required:
                        - id
                        - name
                  count:
                    type: integer
                required:
                  - data
                  - count
              example:
                data:
                  - id: openai/gpt-4.1-nano
                    name: "OpenAI: GPT-4.1 Nano"
                  - id: openai/gpt-4o
                    name: "OpenAI: GPT-4o"
                count: 2
        "400":
          description: Missing or invalid `source`.
        "503":
          description: Requested source has not been loaded.
      operationId: getV1MetadataSearch
  /v1/metadata/lookup:
    get:
      tags:
        - Inference — Models
      summary: Lookup full normalized metadata for a single model (public)
      description: |
        Used by the admin UI to seed the override form when the user enables
        "Override catalog fields".
      security: []
      parameters:
        - in: query
          name: source
          required: true
          schema:
            type: string
            enum:
              - openrouter
              - models.dev
              - catwalk
        - in: query
          name: source_path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full normalized metadata record.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NormalizedModelMetadata"
                required:
                  - data
        "400":
          description: Missing/invalid parameters.
        "404":
          description: No metadata found for the given `source_path`.
        "503":
          description: Source not loaded.
      operationId: getV1MetadataLookup
  /v0/management/auth/verify:
    get:
      tags:
        - Management — Auth
      summary: Verify a candidate admin/API key
      description: |
        Runs the management `authenticate` hook only. Used by the admin UI login
        screen to confirm a credential before persisting it to local storage.
      security:
        - AdminKey: []
      responses:
        "200":
          description: Credential is valid. `role` indicates the principal class.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        type: boolean
                        const: true
                      role:
                        type: string
                        const: admin
                    required:
                      - ok
                      - role
                  - type: object
                    properties:
                      ok:
                        type: boolean
                        const: true
                      role:
                        type: string
                        const: limited
                      keyName:
                        type: string
                      allowedProviders:
                        type: array
                        items:
                          type: string
                      allowedModels:
                        type: array
                        items:
                          type: string
                      quotaName:
                        type:
                          - string
                          - "null"
                      comment:
                        type:
                          - string
                          - "null"
                    required:
                      - ok
                      - role
                      - keyName
                      - allowedProviders
                      - allowedModels
        "401":
          $ref: "#/components/responses/AdminAuthError"
      operationId: getV0ManagementAuthVerify
  /v0/management/self/me:
    get:
      tags:
        - Management — Auth
      summary: Current principal's identity and scoping
      description: "Limited users receive their key metadata and trace toggle state; admins just get `{ role: admin }`."
      security:
        - AdminKey: []
      responses:
        "200":
          description: Principal details.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      role:
                        type: string
                        const: admin
                  - type: object
                    properties:
                      role:
                        type: string
                        const: limited
                      keyName:
                        type: string
                      allowedProviders:
                        type: array
                        items:
                          type: string
                      allowedModels:
                        type: array
                        items:
                          type: string
                      quotaName:
                        type:
                          - string
                          - "null"
                      comment:
                        type:
                          - string
                          - "null"
                      traceEnabled:
                        type: boolean
                      traceEnabledGlobal:
                        type: boolean
                    required:
                      - role
                      - keyName
                      - traceEnabled
                      - traceEnabledGlobal
        "401":
          description: Authentication required or invalid credentials.
      operationId: getV0ManagementSelfMe
  /v0/management/self/rotate:
    post:
      tags:
        - Management — Auth
      summary: Rotate the current principal's key secret
      description: |
        Generates a new `sk-…` secret and overwrites the key's `secret`
        field. The plaintext value is returned exactly once. Admins must
        supply `?keyName=` to rotate another user's key.
      security:
        - AdminKey: []
      parameters:
        - in: query
