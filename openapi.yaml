                    type: boolean
                  name:
                    type: string
                  quota:
                    type: object
        '404':
          description: Quota not found

    delete:
      tags:
        - Management
      summary: Delete user quota
      description: Deletes a user quota definition.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  name:
                    type: string
                  message:
                    type: string
        '404':
          description: Quota not found
        '409':
          description: Quota is assigned to keys

  # ─── Quota Enforcement ───────────────────────────────────────────────
  /v0/management/quota/clear:
    post:
      tags:
        - Management
      summary: Clear quota usage
      description: Resets quota usage counters to zero for a specific API key.
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Quota cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  key:
                    type: string
                  message:
                    type: string

  /v0/management/quota/status/{key}:
    get:
      tags:
        - Management
      summary: Get quota status
      description: Returns the current quota status for an API key.
      security:
        - adminKey: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota status
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  quota_name:
                    type: string
                    nullable: true
                  allowed:
                    type: boolean
                  current_usage:
                    type: integer
                  limit:
                    type: integer
                    nullable: true
                  remaining:
                    type: integer
                    nullable: true
                  resets_at:
                    type: string
                    format: date-time
                    nullable: true

  /v0/management/quota-checker-types:
    get:
      tags:
        - Management
      summary: List valid quota checker types
      description: Returns the list of built-in quota checker type strings.
      security:
        - adminKey: []
      responses:
        '200':
          description: Quota checker types
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer

  # ─── Provider Quota Management ───────────────────────────────────────
  /v0/quotas:
    get:
      tags:
        - Quotas
      summary: List all quota checkers
      description: Returns all configured quota checkers with their latest snapshots.
      security:
        - adminKey: []
      responses:
        '200':
          description: List of quota checkers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuotaCheckerSummary'

  /v0/quotas/{checkerId}:
    get:
      tags:
        - Quotas
      summary: Get quota checker
      description: Returns the latest quota data for a specific checker.
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota checker data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaCheckerSummary'
        '404':
          description: Checker not found

  /v0/quotas/{checkerId}/history:
    get:
      tags:
        - Quotas
      summary: Get quota history
      description: Returns historical quota data for a checker.
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
        - name: windowType
          in: query
          schema:
            type: string
          description: Filter by window type
        - name: since
          in: query
          schema:
            type: string
          description: Start date (ISO timestamp or relative like '7d', '30d')
      responses:
        '200':
          description: Quota history
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkerId:
                    type: string
                  windowType:
                    type: string
                  since:
                    type: string
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuotaSnapshot'

  /v0/quotas/{checkerId}/check:
    post:
      tags:
        - Quotas
      summary: Trigger quota check
      description: Forces an immediate quota check outside the normal polling interval.
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota check result
        '404':
          description: Checker not found

  # ─── MCP Proxy ───────────────────────────────────────────────────────
  /mcp/{name}:
    post:
      tags:
        - MCP Proxy
      summary: MCP JSON-RPC proxy
      description: Proxies JSON-RPC messages to the specified MCP server.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Proxy response

    get:
      tags:
        - MCP Proxy
      summary: MCP SSE stream
      description: Server-sent events stream for MCP server.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

    delete:
      tags:
        - MCP Proxy
      summary: MCP session termination
      description: Terminates the MCP session.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session terminated

  # ─── Self-Service (Limited User) ─────────────────────────────────────
  /v0/management/self/me:
    get:
      tags:
        - Management
      summary: Get current user info
      description: Returns information about the current API key holder.
      security:
        - apiKeyHeader: []
        - bearerAuth: []
        - apiKeyQuery: []
        - googleApiKeyHeader: []
      responses:
        '200':
          description: User info

  /v0/management/self/rotate:
    post:
      tags:
        - Management
      summary: Rotate API key
      description: Rotates the current API key secret.
      security:
        - apiKeyHeader: []
        - bearerAuth: []
        - apiKeyQuery: []
        - googleApiKeyHeader: []
      responses:
        '200':
          description: Key rotated

  /v0/management/self/comment:
    put:
      tags:
        - Management
      summary: Update key comment
      description: Updates the comment for the current API key.
      security:
        - apiKeyHeader: []
        - bearerAuth: []
        - apiKeyQuery: []
        - googleApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: Comment updated

  /v0/management/self/debug/toggle:
    post:
      tags:
        - Management
      summary: Toggle debug for key
      description: Toggles debug logging for the current API key.
      security:
        - apiKeyHeader: []
        - bearerAuth: []
        - apiKeyQuery: []
        - googleApiKeyHeader: []
      responses:
        '200':
          description: Debug toggled

  /v0/management/self/quota:
    get:
      tags:
        - Management
      summary: Get own quota status
      description: Returns quota status for the current API key.
      security:
        - apiKeyHeader: []
        - bearerAuth: []
        - apiKeyQuery: []
        - googleApiKeyHeader: []
      responses:
        '200':
          description: Quota status

  # ─── Metrics ─────────────────────────────────────────────────────────
  /metrics:
    get:
      tags:
        - Management
      summary: Prometheus metrics
      description: Returns Prometheus-compatible metrics.
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token (Plexus API key)
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: Plexus API key via x-api-key header
    googleApiKeyHeader:
      type: apiKey
      in: header
      name: x-goog-api-key
      description: Plexus API key via x-goog-api-key header
    apiKeyQuery:
      type: apiKey
      in: query
      name: key
      description: Plexus API key via query parameter
    adminKey:
      type: apiKey
      in: header
      name: x-admin-key
      description: Admin key for management endpoints

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: integer

    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: Model alias to use
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                oneOf:
                  - type: string
                  - type: array
              tool_calls:
                type: array
              tool_call_id:
                type: string
        stream:
          type: boolean
          default: false
        max_tokens:
          type: integer
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
        n:
          type: integer
          default: 1
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        presence_penalty:
          type: number
        frequency_penalty:
          type: number
        tools:
          type: array
          items:
            type: object
        tool_choice:
          oneOf:
            - type: string
              enum: [auto, none, required]
            - type: object
        user:
          type: string
        response_format:
          type: object

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
                  tool_calls:
                    type: array
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    EmbeddingsRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        encoding_format:
          type: string
          enum: [float, base64]
          default: float
        dimensions:
          type: integer
        user:
          type: string

    EmbeddingsResponse:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              embedding:
                type: array
                items:
                  type: number
              index:
                type: integer
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer

    SpeechRequest:
      type: object
      required:
        - model
        - input
        - voice
      properties:
        model:
          type: string
        input:
          type: string
          maxLength: 4096
        voice:
          type: string
          enum: [alloy, ash, ballad, coral, echo, fable, onyx, nova, sage, shimmer, verse, marin, cedar]
        instructions:
          type: string
        response_format:
          type: string
          enum: [mp3, opus, aac, flac, wav, pcm]
          default: mp3
        speed:
          type: number
          minimum: 0.25
          maximum: 4.0
          default: 1.0
        stream_format:
          type: string
          enum: [sse, audio]

    ImageGenerationRequest:
      type: object
      required:
        - model
        - prompt
      properties:
        model:
          type: string
        prompt:
          type: string
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
        size:
          type: string
          enum: ['256x256', '512x512', '1024x1024', '1792x1024', '1024x1792']
        response_format:
          type: string
          enum: [url, b64_json]
          default: url
        quality:
          type: string
          enum: [standard, hd, high, medium, low]
        style:
          type: string
          enum: [vivid, natural]
        user:
          type: string

    ImageGenerationResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string
              revised_prompt:
                type: string

    ModelList:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
              created:
                type: integer
              owned_by:
                type: string
              name:
                type: string
              description:
                type: string
              context_length:
                type: integer
              architecture:
                type: object
              pricing:
                type: object
              supported_parameters:
                type: array
                items:
                  type: string
              top_provider:
                type: object

    ProviderConfig:
      type: object
      required:
        - api_base_url
      properties:
        display_name:
          type: string
        api_base_url:
          oneOf:
            - type: string
            - type: object
        api_key:
          type: string
        enabled:
          type: boolean
          default: true
        disable_cooldown:
          type: boolean
          default: false
        discount:
          type: number
          minimum: 0
          maximum: 1
        models:
          oneOf:
            - type: array
              items:
                type: string
            - type: object
        headers:
          type: object
        estimateTokens:
          type: boolean
          default: false
        useClaudeMasking:
          type: boolean
          default: false
        gpu_profile:
          type: string
        gpu_ram_gb:
          type: number
        gpu_bandwidth_tb_s:
          type: number
        gpu_flops_tflop:
          type: number
        gpu_power_draw_watts:
          type: number

    ModelConfig:
      type: object
      properties:
        targets:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              model:
                type: string
              enabled:
                type: boolean
                default: true
        fail_policy:
          type: object
          properties:
            enabled:
              type: boolean
            retryableStatusCodes:
              type: array
              items:
                type: integer
            retryableErrors:
              type: array
              items:
                type: string
        metadata:
          type: object
          properties:
            source:
              type: string
              enum: [openrouter, models.dev, catwalk, custom]
            source_path:
              type: string
            overrides:
              type: object
        model_architecture:
          type: object

    KeyConfig:
      type: object
      required:
        - secret
      properties:
        secret:
          type: string
        comment:
          type: string
        enabled:
          type: boolean
          default: true
        role:
          type: string
          enum: [admin, limited]
          default: limited
        allowedProviders:
          type: array
          items:
            type: string
        allowedModels:
          type: array
          items:
            type: string
        quota:
          type: string

    UserQuotaDefinition:
      type: object
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum: [rolling]
            limitType:
              type: string
              enum: [requests, tokens, cost]
            limit:
              type: integer
              minimum: 1
            duration:
              type: string
        - type: object
          properties:
            type:
              type: string
              enum: [daily, weekly, monthly]
            limitType:
              type: string
              enum: [requests, tokens, cost]
            limit:
              type: integer
              minimum: 1

    Cooldown:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        expiry:
          type: integer
        timeRemainingMs:
          type: integer
        consecutiveFailures:
          type: integer

    QuotaWindow:
      type: object
      properties:
        windowType:
          type: string
        windowLabel:
          type: string
        description:
          type: string
        limit:
          type: number
        used:
          type: number
        remaining:
          type: number
        utilizationPercent:
          type: number
        unit:
          type: string
        resetsAt:
          type: string
          format: date-time
        resetInSeconds:
          type: integer
        status:
          type: string
          enum: [ok, warning, critical, exhausted]
        estimation:
          type: object

    QuotaSnapshot:
      type: object
      properties:
        id:
          type: integer
        provider:
          type: string
        checkerId:
          type: string
        groupId:
          type: string
          nullable: true
        windowType:
          type: string
        checkedAt:
          type: string
          format: date-time
        limit:
          type: number
          nullable: true
        used:
          type: number
          nullable: true
        remaining:
          type: number
          nullable: true
        utilizationPercent:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        resetsAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          nullable: true
        success:
          type: boolean
        errorMessage:
          type: string
          nullable: true

    QuotaCheckerSummary:
      type: object
      properties:
        checkerId:
          type: string
        checkerType:
          type: string
        checkerCategory:
          type: string
          enum: [balance, rate-limit]
        latest:
          type: array
          items:
            $ref: '#/components/schemas/QuotaWindow'
        oauthAccountId:
          type: string
        oauthProvider:
          type: string
        error:
          type: string

    UsageRecord:
      type: object
      properties:
        requestId:
          type: string
        date:
          type: string
          format: date-time
        sourceIp:
          type: string
          nullable: true
        apiKey:
          type: string
          nullable: true
        attribution:
          type: string
          nullable: true
        incomingApiType:
          type: string
        provider:
          type: string
          nullable: true
        incomingModelAlias:
          type: string
          nullable: true
        selectedModelName:
          type: string
          nullable: true
        outgoingApiType:
          type: string
          nullable: true
        tokensInput:
          type: integer
          nullable: true
        tokensOutput:
          type: integer
          nullable: true
        tokensReasoning:
          type: integer
          nullable: true
        tokensCached:
          type: integer
          nullable: true
        tokensCacheWrite:
          type: integer
          nullable: true
        costInput:
          type: number
          nullable: true
        costOutput:
          type: number
          nullable: true
        costCached:
          type: number
          nullable: true
        costTotal:
          type: number
          nullable: true
        durationMs:
          type: integer
        isStreamed:
          type: boolean
        responseStatus:
          type: string
        hasDebug:
          type: boolean
        hasError:
          type: boolean

    UsageRecordsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UsageRecord'
        total:
          type: integer

    UsageSummary:
      type: object
      properties:
        range:
          type: string
        series:
          type: array
          items:
            type: object
            properties:
              bucketStartMs:
                type: integer
              requests:
                type: integer
              inputTokens:
                type: integer
              outputTokens:
                type: integer
              cachedTokens:
                type: integer
              cacheWriteTokens:
                type: integer
              tokens:
                type: integer
        stats:
          type: object
          properties:
            totalRequests:
              type: integer
            totalTokens:
              type: integer
            totalKwhUsed:
              type: number
            avgDurationMs:
              type: number
            totalDurationMs:
              type: integer
        today:
          type: object
          properties:
            requests:
              type: integer
            inputTokens:
              type: integer
            outputTokens:
              type: integer
            reasoningTokens:
              type: integer
            cachedTokens:
              type: integer
            cacheWriteTokens:
              type: integer
            kwhUsed:
              type: number
            totalCost:
              type: number

    McpServerConfig:
      type: object
      required:
        - upstream_url
      properties:
        upstream_url:
          type: string
          format: uri
        enabled:
          type: boolean
          default: true
        headers:
          type: object

  responses:
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
