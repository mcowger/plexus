      security:
        - BearerAuth: []
        - ApiKeyHeader: []
        - GoogApiKeyHeader: []
        - ApiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Proxy response
    get:
      summary: MCP Proxy GET (SSE)
      description: Opens an SSE connection to an MCP server
      security:
        - BearerAuth: []
        - ApiKeyHeader: []
        - GoogApiKeyHeader: []
        - ApiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
    delete:
      summary: MCP Proxy DELETE
      description: Terminates an MCP session
      security:
        - BearerAuth: []
        - ApiKeyHeader: []
        - GoogApiKeyHeader: []
        - ApiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session terminated

