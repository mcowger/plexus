# Plexus API OpenAPI 3.1.0 Specification
# https://github.com/mcowger/plexus

openapi: 3.1.0
info:
  title: Plexus API
  description: |
    Plexus is a unified API gateway for LLMs. It exposes OpenAI- and Anthropic-compatible endpoints
    and routes requests to any backend provider, handling request/response transformation automatically.
    
    ## Authentication
    
    **Inference APIs (`/v1/*`, `/v1beta/*`):**
    Require a Plexus API key passed via one of the following methods (checked in order):
    - `Authorization: Bearer sk-my-key`
    - `Authorization: sk-my-key`
    - `x-api-key: sk-my-key`
    - `x-goog-api-key: sk-my-key`
    - Query parameter: `?key=sk-my-key`
    
    **Dynamic Key Attribution:**
    Append `:label` to the key for usage tracking:
    - `Authorization: Bearer sk-my-key:copilot`
    
    **Management APIs (`/v0/management/*`, `/v0/quotas/*`):**
    Require the `x-admin-key` header matching the `ADMIN_KEY` environment variable.
    
    **Public Endpoints (No Auth Required):**
    - `GET /health`
    - `GET /v1/models`
    - `GET /v1/openrouter/models`
    - `GET /v1/metadata/search`
    - All `/.well-known/*` endpoints
    - `POST /register`
  version: '1.0.0'
  contact:
    name: Plexus
    url: https://github.com/mcowger/plexus
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:4000
    description: Local development server

# Security Schemes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API Key authentication for inference endpoints. Use your Plexus API key as the bearer token.
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
      description: Alternative API key authentication via header
    apiKeyGoog:
      type: apiKey
      in: header
      name: x-goog-api-key
      description: Google-compatible API key authentication via header
    apiKeyQuery:
      type: apiKey
      in: query
      name: key
      description: API key authentication via query parameter
    adminKey:
      type: apiKey
      in: header
      name: x-admin-key
      description: Admin key authentication for management endpoints

# Reusable Components
  schemas:
    # Error Schemas
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: integer
          required:
            - message
            - type

    ConflictError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: Quota is assigned to one or more keys
            type:
              type: string
              enum: [conflict]
            code:
              type: integer
              example: 409
          required:
            - message
            - type
            - code

    AuthError:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
              enum: [auth_error]
            code:
              type: integer
              example: 401
          required:
            - message
            - type
            - code

    # Model Schemas
    Model:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: model
        created:
          type: integer
          description: Unix timestamp
        owned_by:
          type: string
          example: plexus
        name:
          type: string
          description: Present when metadata is configured
        description:
          type: string
        context_length:
          type: integer
        architecture:
          type: object
          properties:
            input_modalities:
              type: array
              items:
                type: string
            output_modalities:
              type: array
              items:
                type: string
            tokenizer:
              type: string
        pricing:
          type: object
          properties:
            prompt:
              type: string
            completion:
              type: string
            input_cache_read:
              type: string
        supported_parameters:
          type: array
          items:
            type: string
        top_provider:
          type: object
          properties:
            context_length:
              type: integer
            max_completion_tokens:
              type: integer
      required:
        - id
        - object
        - created
        - owned_by

    ModelsList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Model'
      required:
        - object
        - data

    MetadataSearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        count:
          type: integer
      required:
        - data
        - count

    # Chat Completions Schemas
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          oneOf:
            - type: string
            - type: null
            - type: array
              items:
                type: object
        name:
          type: string
        tool_calls:
          type: array
          items:
            type: object
        tool_call_id:
          type: string
      required:
        - role
        - content

    ToolDefinition:
      type: object
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
          required:
            - name
            - parameters
      required:
        - type
        - function

    ChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: The model identifier or alias
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        max_tokens:
          type: integer
        temperature:
          type: number
          minimum: 0
          maximum: 2
        stream:
          type: boolean
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        tool_choice:
          oneOf:
            - type: string
              enum: [auto, none, required]
            - type: object
        response_format:
          type: object
          properties:
            type:
              type: string
              enum: [text, json_object, json_schema]
            json_schema:
              type: object
        parallel_tool_calls:
          type: boolean
        top_p:
          type: number
        frequency_penalty:
          type: number
        presence_penalty:
          type: number
        user:
          type: string
      required:
        - model
        - messages

    ChatCompletionChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
      required:
        - index
        - message

    UsageInfo:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        prompt_tokens_details:
          type: object
        completion_tokens_details:
          type: object
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/UsageInfo'
      required:
        - id
        - object
        - created
        - model
        - choices

    ChatCompletionStreamChunk:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion.chunk]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
                  tool_calls:
                    type: array
              finish_reason:
                type: string

    # Embeddings Schemas
    EmbeddingsRequest:
      type: object
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        encoding_format:
          type: string
          enum: [float, base64]
        dimensions:
          type: integer
        user:
          type: string
      required:
        - model
        - input

    Embedding:
      type: object
      properties:
        object:
          type: string
          enum: [embedding]
        embedding:
          type: array
          items:
            type: number
        index:
          type: integer
      required:
        - object
        - embedding
        - index

    EmbeddingsResponse:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Embedding'
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer
      required:
        - object
        - data
        - model

    # Audio/Speech Schemas
    SpeechRequest:
      type: object
      properties:
        model:
          type: string
        input:
          type: string
          maxLength: 4096
        voice:
          type: string
          enum:
            [alloy, ash, ballad, coral, echo, fable, onyx, nova, sage, shimmer, verse, marin, cedar]
        instructions:
          type: string
        response_format:
          type: string
          enum: [mp3, opus, aac, flac, wav, pcm]
        speed:
          type: number
          minimum: 0.25
          maximum: 4.0
        stream_format:
          type: string
          enum: [sse, audio]
      required:
        - model
        - input
        - voice

    TranscriptionRequest:
      type: object
      properties:
        model:
          type: string
        file:
          type: string
          format: binary
        language:
          type: string
        prompt:
          type: string
        response_format:
          type: string
          enum: [json, text, verbose_json]
        temperature:
          type: number
      required:
        - model
        - file

    TranscriptionResponse:
      type: object
      properties:
        text:
          type: string
        language:
          type: string
        duration:
          type: number
        segments:
          type: array
          items:
            type: object
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            total_tokens:
              type: integer

    # Images Schemas
    ImagesGenerationRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
        n:
          type: integer
          minimum: 1
          maximum: 10
        size:
          type: string
          enum: ['256x256', '512x512', '1024x1024', '1792x1024', '1024x1792']
        response_format:
          type: string
          enum: [url, b64_json]
        quality:
          type: string
          enum: [standard, hd, high, medium, low]
        style:
          type: string
          enum: [vivid, natural]
        user:
          type: string
      required:
        - model
        - prompt

    ImagesResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string
              revised_prompt:
                type: string

    # Responses API Schemas (OpenAI Compatible)
    ResponsesInputItem:
      type: object
      properties:
        type:
          type: string
          enum: [message, function_call, function_call_output, reasoning]
        id:
          type: string

    ResponsesMessageItem:
      allOf:
        - $ref: '#/components/schemas/ResponsesInputItem'
        - type: object
          properties:
            type:
              type: string
              enum: [message]
            role:
              type: string
              enum: [user, assistant, system, developer]
            content:
              type: array

    ResponsesRequest:
      type: object
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ResponsesInputItem'
        instructions:
          type: string
        tools:
          type: array
          items:
            type: object
        tool_choice:
          oneOf:
            - type: string
              enum: [none, auto, required]
            - type: object
        parallel_tool_calls:
          type: boolean
        temperature:
          type: number
        top_p:
          type: number
        max_output_tokens:
          type: integer
        reasoning:
          type: object
          properties:
            effort:
              type: string
              enum: [low, medium, high, minimal, xhigh]
            summary:
              type: string
            max_tokens:
              type: integer
        stream:
          type: boolean
        store:
          type: boolean
        previous_response_id:
          type: string
        conversation:
          oneOf:
            - type: string
            - type: object
        metadata:
          type: object
          additionalProperties:
            type: string
      required:
        - model
        - input

    ResponsesResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: response
        created_at:
          type: integer
        status:
          type: string
          enum: [completed, failed, in_progress, cancelled, queued, incomplete]
        model:
          type: string
        output:
          type: array
        usage:
          $ref: '#/components/schemas/UsageInfo'
        previous_response_id:
          type: string
        incomplete_details:
          type: object
        error:
          $ref: '#/components/schemas/Error'
      required:
        - id
        - object
        - created_at
        - status
        - model

    # Usage Record Schema
    UsageRecord:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        sourceIp:
          type: string
          nullable: true
        apiKey:
          type: string
          nullable: true
        attribution:
          type: string
          nullable: true
        incomingApiType:
          type: string
        provider:
          type: string
          nullable: true
        attemptCount:
          type: integer
        incomingModelAlias:
          type: string
          nullable: true
        canonicalModelName:
          type: string
          nullable: true
        selectedModelName:
          type: string
          nullable: true
        outgoingApiType:
          type: string
          nullable: true
        tokensInput:
          type: integer
          nullable: true
        tokensOutput:
          type: integer
          nullable: true
        tokensReasoning:
          type: integer
          nullable: true
        tokensCached:
          type: integer
          nullable: true
        tokensCacheWrite:
          type: integer
          nullable: true
        costTotal:
          type: number
          nullable: true
        costSource:
          type: string
          nullable: true
        durationMs:
          type: integer
        ttftMs:
          type: integer
          nullable: true
        tokensPerSec:
          type: number
          nullable: true
        isStreamed:
          type: boolean
        responseStatus:
          type: string
          enum: [success, error]
        finishReason:
          type: string
          nullable: true
        hasDebug:
          type: boolean
        hasError:
          type: boolean

    UsageListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UsageRecord'
        total:
          type: integer

    UsageSummaryResponse:
      type: object
      properties:
        range:
          type: string
        series:
          type: array
          items:
            type: object
            properties:
              bucketStartMs:
                type: integer
              requests:
                type: integer
              inputTokens:
                type: integer
              outputTokens:
                type: integer
              cachedTokens:
                type: integer
              cacheWriteTokens:
                type: integer
              tokens:
                type: integer
              kwhUsed:
                type: number
        stats:
          type: object
          properties:
            totalRequests:
              type: integer
            totalTokens:
              type: integer
            totalKwhUsed:
              type: number
            avgDurationMs:
              type: number
            totalDurationMs:
              type: integer
        today:
          type: object
          properties:
            requests:
              type: integer
            inputTokens:
              type: integer
            outputTokens:
              type: integer
            reasoningTokens:
              type: integer
            cachedTokens:
              type: integer
            cacheWriteTokens:
              type: integer
            totalCost:
              type: number
            kwhUsed:
              type: number

    # Provider Config Schemas
    ProviderConfig:
      type: object
      properties:
        baseUrl:
          type: string
          format: uri
        apiKey:
          type: string
        models:
          type: object
          additionalProperties:
            type: object
        extraHeaders:
          type: object
        disableCooldown:
          type: boolean
        quotaChecker:
          type: object
        gpu_ram_gb:
          type: number
        gpu_bandwidth_tb_s:
          type: number

    ModelAliasConfig:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              model:
                type: string
        metadata:
          type: object
          properties:
            source:
              type: string
            source_path:
              type: string
            overrides:
              type: object
        model_architecture:
          type: object

    APIKeyConfig:
      type: object
      properties:
        name:
          type: string
        secret:
          type: string
        allowedProviders:
          type: array
          items:
            type: string
        allowedModels:
          type: array
          items:
            type: string
        quota:
          type: string
        comment:
          type: string

    # Quota Schemas
    QuotaCheckResult:
      type: object
      properties:
        provider:
          type: string
        checkerId:
          type: string
        windowType:
          type: string
        limit:
          type: number
        used:
          type: number
        remaining:
          type: number
        utilizationPercent:
          type: number
        unit:
          type: string
        status:
          type: string
          enum: [ok, warning, critical, exhausted]

    # MCP Schemas
    McpServerConfig:
      type: object
      properties:
        upstream_url:
          type: string
          format: uri
        enabled:
          type: boolean
        headers:
          type: object
          additionalProperties:
            type: string
      required:
        - upstream_url

    # OAuth Schemas
    OAuthAuthorizationServer:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        resource_supported:
          type: boolean

    OAuthProtectedResource:
      type: object
      properties:
        resource:
          type: string
        authorization_servers:
          type: array
          items:
            type: string
        scopes_supported:
          type: array
          items:
            type: string
        bearer_methods_supported:
          type: array
          items:
            type: string

    OpenIDConfiguration:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        jwks_uri:
          type: string
        response_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string

    DynamicClientRegistration:
      type: object
      properties:
        client_id:
          type: string
        client_id_issued_at:
          type: integer
        client_secret:
          type: string
        grant_types:
          type: array
          items:
            type: string
        token_endpoint_auth_method:
          type: string

  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
      description: Number of records to return
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
      description: Number of records to skip

# Tags
tags:
  - name: Health
    description: Health check endpoints
  - name: Inference
    description: OpenAI/Anthropic-compatible inference endpoints
  - name: Models
    description: Model listing and metadata endpoints
  - name: Management
    description: Administrative management endpoints (requires admin key)
  - name: Quotas
    description: Provider quota monitoring endpoints
  - name: MCP
    description: Model Context Protocol proxy endpoints
  - name: Discovery
    description: OAuth and discovery endpoints

# API Paths
paths:
  # Health
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns OK if the server is running
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  # Models
  /v1/models:
    get:
      tags: [Models]
      summary: List models
      description: Returns all configured model aliases with optional enriched metadata
      security: []
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsList'

  /v1/openrouter/models:
    get:
      tags: [Models]
      summary: List OpenRouter models
      description: Returns models fetched from OpenRouter (requires OpenRouter provider configured)
      security: []
      responses:
        '200':
          description: List of OpenRouter models
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '503':
          description: OpenRouter pricing data not yet loaded

  /v1/metadata/search:
    get:
      tags: [Models]
      summary: Search metadata catalog
      description: Search a loaded metadata catalog for use in admin UI autocomplete
      security: []
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [openrouter, models.dev, catwalk]
          description: Metadata source
        - name: q
          in: query
          schema:
            type: string
          description: Substring search query
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Maximum results to return
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataSearchResult'
        '400':
          description: Missing or invalid source parameter
        '503':
          description: Requested source not loaded

  /v1/metadata/lookup:
    get:
      tags: [Models]
      summary: Lookup metadata by ID
      description: Return full metadata for a single model in a catalog source
      security: []
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [openrouter, models.dev, catwalk]
        - name: source_path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metadata found
        '400':
          description: Missing or invalid parameters
        '404':
          description: Metadata not found
        '503':
          description: Source not loaded

  # Chat Completions
  /v1/chat/completions:
    post:
      tags: [Inference]
      summary: Create chat completion
      description: OpenAI-compatible chat completions endpoint
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatCompletionStreamChunk'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Embeddings
  /v1/embeddings:
    post:
      tags: [Inference]
      summary: Create embeddings
      description: OpenAI-compatible embeddings endpoint
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      requestBody:
        required: true
        content:
