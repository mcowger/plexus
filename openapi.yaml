    get:
      tags: [Management]
      summary: Get provider
      description: Get a specific provider configuration
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderConfig'
        '404':
          description: Provider not found

    put:
      tags: [Management]
      summary: Create/update provider
      description: Full create or replace of provider configuration
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderConfig'
      responses:
        '200':
          description: Provider saved
        '400':
          description: Validation failed

    patch:
      tags: [Management]
      summary: Patch provider
      description: Partial update of provider configuration
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
