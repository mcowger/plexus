        '200':
          description: Provider deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  provider:
                    type: string
                  removedTargets:
                    type: integer
                  affectedAliases:
                    type: array
                    items:
                      type: string
        '404':
