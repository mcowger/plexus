  /v0/management/usage:
    get:
      tags: [Management]
      summary: List usage records
      description: Returns usage records with filtering and pagination
      security:
        - adminKey: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: apiKey
          in: query
          schema:
            type: string
        - name: attribution
          in: query
          schema:
            type: string
        - name: incomingApiType
          in: query
          schema:
            type: string
            enum: [chat, messages, responses, embeddings, transcriptions, speech, images]
        - name: provider
          in: query
          schema:
            type: string
        - name: incomingModelAlias
          in: query
          schema:
            type: string
        - name: responseStatus
          in: query
          schema:
            type: string
            enum: [success, error]
        - name: fields
          in: query
          schema:
            type: string
          description: Comma-separated list of field names to return
