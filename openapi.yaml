                  level:
                    type: string
                  startupLevel:
                    type: string
                  supportedLevels:
                    type: array
                    items:
                      type: string
                  ephemeral:
                    type: boolean

    post:
      tags: [Management]
      summary: Set logging level
      description: Set runtime log verbosity
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  type: string
                  enum: [error, warn, info, debug, verbose, silly]
              required:
                - level
      responses:
        '200':
          description: Logging level set

    delete:
      tags: [Management]
      summary: Reset logging level
      description: Reset to startup default
      security:
        - adminKey: []
      responses:
        '200':
          description: Logging level reset

  # Management - System Logs
  /v0/system/logs/stream:
    get:
      tags: [Management]
      summary: System log stream
      description: Server-sent events stream of all backend log entries
      security:
        - adminKey: []
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object
                description: Server-sent event stream with syslog events

  # Management - Test
  /v0/management/test:
    post:
      tags: [Management]
      summary: Test provider
      description: Run a lightweight test inference request
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                model:
                  type: string
                apiType:
                  type: string
                  enum: [chat, messages, gemini, responses, embeddings, images, speech, oauth]
              required:
                - provider
                - model
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  durationMs:
                    type: integer
                  apiType:
                    type: string
                  response:
                    type: string

  # Management - MCP Servers
  /v0/management/mcp-servers:
    get:
      tags: [Management]
      summary: List MCP servers
      security:
        - adminKey: []
      responses:
        '200':
          description: List of MCP servers
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/McpServerConfig'

  /v0/management/mcp-servers/{serverName}:
    put:
      tags: [Management]
      summary: Create/update MCP server
      security:
        - adminKey: []
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9][a-z0-9-_]{1,62}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerConfig'
      responses:
        '200':
          description: Server saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  name:
                    type: string
        '400':
          description: Invalid server name or missing upstream_url

    delete:
      tags: [Management]
      summary: Delete MCP server
      security:
        - adminKey: []
      parameters:
        - name: serverName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server deleted
        '404':
          description: Server not found

  # Management - MCP Logs
  /v0/management/mcp-logs:
    get:
      tags: [Management]
      summary: List MCP logs
      security:
        - adminKey: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: serverName
          in: query
          schema:
            type: string
        - name: apiKey
          in: query
          schema:
            type: string
      responses:
        '200':
          description: MCP logs

    delete:
      tags: [Management]
      summary: Delete MCP logs
      security:
        - adminKey: []
      parameters:
        - name: olderThanDays
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Logs deleted

  /v0/management/mcp-logs/{requestId}:
    delete:
      tags: [Management]
      summary: Delete single MCP log
      security:
        - adminKey: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log deleted
        '404':
          description: Log not found

  # Management - Errors
  /v0/management/errors:
    get:
      tags: [Management]
      summary: List error logs
      description: Returns inference error records
      security:
        - adminKey: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Error logs

    delete:
      tags: [Management]
      summary: Delete all error logs
      security:
        - adminKey: []
      responses:
        '200':
          description: Logs deleted

  /v0/management/errors/{requestId}:
    delete:
      tags: [Management]
      summary: Delete single error log
      security:
        - adminKey: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log deleted
        '404':
          description: Log not found

  # Management - User Quotas
  /v0/management/user-quotas:
    get:
      tags: [Management]
      summary: List user quota definitions
      description: Returns all per-key quota definitions
      security:
        - adminKey: []
      responses:
        '200':
          description: Quota definitions
          content:
            application/json:
              schema:
                type: object

  /v0/management/user-quotas/{name}:
    get:
      tags: [Management]
      summary: Get quota definition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota definition
        '404':
          description: Quota not found

    post:
      tags: [Management]
      summary: Create/replace quota definition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [rolling, daily, weekly]
                limitType:
                  type: string
                  enum: [requests, tokens]
                limit:
                  type: integer
                duration:
                  type: string
              required:
                - type
                - limitType
                - limit
      responses:
        '200':
          description: Quota created
        '400':
          description: Validation failed

    patch:
      tags: [Management]
      summary: Partial update quota definition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Quota updated
        '404':
          description: Quota not found

    delete:
      tags: [Management]
      summary: Delete quota definition
      description: Cannot delete quota assigned to keys
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota deleted
        '404':
          description: Quota not found
        '409':
          description: Quota assigned to keys

  # Management - Quota Enforcement
  /v0/management/quota/clear:
    post:
      tags: [Management]
      summary: Clear quota usage
      description: Reset quota usage counters for an API key
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
              required:
                - key
      responses:
        '200':
          description: Quota cleared

  /v0/management/quota/status/{key}:
    get:
      tags: [Management]
      summary: Get quota status
      description: Returns quota usage status for an API key
      security:
        - adminKey: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota status
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  quota_name:
                    type: string
                    nullable: true
                  allowed:
                    type: boolean
                  current_usage:
                    type: integer
                  limit:
                    type: integer
                    nullable: true
                  remaining:
                    type: integer
                    nullable: true
                  resets_at:
                    type: string
                    format: date-time
                    nullable: true

  # Management - Models (AI Energy)
  /v0/management/models:
    get:
      tags: [Management]
      summary: List models for energy calculations
      description: Returns models with architecture for energy estimation
      security:
        - adminKey: []
      responses:
        '200':
          description: Model list

  # Quota Routes
  /v0/quotas:
    get:
      tags: [Quotas]
      summary: List all quota checkers
      description: Returns provider-level rate limits and account quotas
      security:
        - adminKey: []
      responses:
        '200':
          description: List of quota checkers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    checkerId:
                      type: string
                    checkerType:
                      type: string
                    checkerCategory:
                      type: string
                    latest:
                      type: array
                      items:
                        $ref: '#/components/schemas/QuotaCheckResult'

  /v0/quotas/{checkerId}:
    get:
      tags: [Quotas]
      summary: Get quota for checker
      description: Returns latest quota for a specific checker
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota data
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkerId:
                    type: string
                  checkerType:
                    type: string
                  latest:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuotaCheckResult'

  /v0/quotas/{checkerId}/history:
    get:
      tags: [Quotas]
      summary: Get quota history
      description: Returns historical quota data
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
        - name: windowType
          in: query
          schema:
            type: string
          description: Filter by window type
        - name: since
          in: query
          schema:
            type: string
          description: ISO timestamp or relative format (e.g., '7d', '30d')
      responses:
        '200':
          description: Quota history
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkerId:
                    type: string
                  windowType:
                    type: string
                  since:
                    type: string
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuotaCheckResult'

  /v0/quotas/{checkerId}/check:
    post:
      tags: [Quotas]
      summary: Trigger quota check
      description: Force immediate quota check outside normal polling
      security:
        - adminKey: []
      parameters:
        - name: checkerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaCheckResult'

  # MCP Proxy Routes
  /mcp/{name}:
    post:
      tags: [MCP]
      summary: MCP JSON-RPC message
      description: Proxy JSON-RPC message to MCP server
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: MCP response
        '400':
          description: Invalid server name
        '404':
          description: MCP server not found
        '502':
          description: Upstream error
        '504':
          description: Upstream timeout

    get:
      tags: [MCP]
      summary: MCP SSE stream
      description: Server-sent events stream from MCP server
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object

    delete:
      tags: [MCP]
      summary: MCP session termination
      description: Terminate MCP session
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session terminated

  # OAuth Discovery Routes
  /.well-known/oauth-authorization-server:
    get:
      tags: [Discovery]
      summary: OAuth authorization server metadata
      description: Returns OAuth 2.0 authorization server metadata
      security: []
      responses:
        '200':
          description: Authorization server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizationServer'

  /.well-known/oauth-protected-resource:
    get:
      tags: [Discovery]
      summary: OAuth protected resource metadata
      description: Returns OAuth 2.0 protected resource metadata
      security: []
      responses:
        '200':
          description: Protected resource metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProtectedResource'

  /.well-known/openid-configuration:
    get:
      tags: [Discovery]
      summary: OpenID Connect configuration
      description: Returns OIDC discovery configuration
      security: []
      responses:
        '200':
          description: OIDC configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenIDConfiguration'

  /register:
    post:
      tags: [Discovery]
      summary: Dynamic client registration
      description: OAuth 2.0 dynamic client registration endpoint
      security: []
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DynamicClientRegistration'

  # Responses API (Codex alias)
  /v1/codex/responses:
    post:
      tags: [Inference]
      summary: Create response (Codex)
      description: |
        OpenAI Responses API compatible endpoint for Codex CLI.
        Alias for /v1/responses.
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
      responses:
        '200':
          description: Response created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
        '401':
          description: Authentication failed

  # Anthropic Messages
  /v1/messages:
    post:
      tags: [Inference]
      summary: Create message
      description: |
        Anthropic-compatible Messages API endpoint.
        Supports Claude models with streaming and tool use.
      security:
        - bearerAuth: []
        - apiKeyHeader: []
        - apiKeyGoog: []
        - apiKeyQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                messages:
                  type: array
                max_tokens:
                  type: integer
                temperature:
                  type: number
                stream:
                  type: boolean
                system:
                  oneOf:
                    - type: string
                    - type: array
                tools:
                  type: array
                tool_choice:
                  type: object
                thinking:
                  type: object
              required:
                - model
                - messages
                - max_tokens
      responses:
        '200':
          description: Message response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication failed

  # UI Routes (Static)
  /ui:
    get:
      tags: [UI]
      summary: Dashboard UI
      description: Serves the Plexus web dashboard
      security: []
      responses:
        '200':
          description: Dashboard HTML
          content:
            text/html:
              schema:
                type: string

  /ui/{filename}:
    get:
      tags: [UI]
      summary: Static UI assets
      description: Serves dashboard static files
      security: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Static asset
          content:
            '*/*':
              schema:
                type: string
                format: binary
