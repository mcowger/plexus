        - Management
      summary: List usage records
      description: Returns usage records with filtering and pagination.
      security:
        - adminKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: apiKey
          in: query
          schema:
            type: string
        - name: attribution
          in: query
          schema:
            type: string
        - name: incomingApiType
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: incomingModelAlias
          in: query
          schema:
            type: string
        - name: responseStatus
          in: query
          schema:
            type: string
            enum: [success, error]
      responses:
        '200':
          description: Usage records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageRecordsResponse'

    delete:
      tags:
        - Management
      summary: Delete usage records
      description: Deletes usage records, optionally older than a specified number of days.
      security:
        - adminKey: []
      parameters:
        - name: olderThanDays
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Records deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /v0/management/usage/summary:
    get:
      tags:
        - Management
      summary: Usage summary
      description: Returns aggregated time-series data and totals for a time range.
      security:
        - adminKey: []
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [hour, day, week, month, custom]
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'

  /v0/management/usage/{requestId}:
    delete:
      tags:
        - Management
      summary: Delete single usage record
      description: Deletes a specific usage record by ID.
      security:
        - adminKey: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Record deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '404':
          description: Record not found

  /v0/management/events:
    get:
      tags:
        - Management
      summary: Live usage events (SSE)
      description: |
        Streams a `log` event for every completed inference request as it is
        saved to the database. Uses Server-Sent Events (SSE).
      security:
        - adminKey: []
      responses:
        '200':
          description: SSE stream of usage events
          content:
            text/event-stream:
              schema:
                type: string

  /v0/management/concurrency:
    get:
