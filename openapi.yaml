openapi: 3.1.0
info:
  title: Plexus API
  description: |
    Plexus is a unified API gateway for LLMs. Built on Bun + Fastify, it exposes
    OpenAI- and Anthropic-compatible endpoints and routes requests to any backend
    provider, handling request/response transformation automatically.

    ## Authentication

    All inference endpoints (`/v1/*`, `/v1beta/*`) require a Plexus API key.
    Management endpoints (`/v0/*`) require a separate **Admin Key** passed via `x-admin-key`.

    ### Accepted Credentials (Inference APIs)

    Plexus accepts a key via any of the following, checked in this order:

    | Method | Example |
    |--------|---------|
    | `Authorization` header | `Authorization: Bearer sk-my-key` |
    | `Authorization` header (no prefix) | `Authorization: sk-my-key` |
    | `x-api-key` header | `x-api-key: sk-my-key` |
    | `x-goog-api-key` header | `x-goog-api-key: sk-my-key` |
    | `?key=` query parameter | `GET /v1/models?key=sk-my-key` |

    ### Dynamic Key Attribution

    To tag a request with an attribution label for usage tracking, append `:label` to the key:
    `Authorization: Bearer sk-my-key:copilot`

    ### Public Endpoints (No Auth Required)

    - `GET /health`
    - `GET /v1/models`
    - `GET /v1/openrouter/models`
    - `GET /v1/metadata/search`
    - All `/.well-known/*` and `/register` MCP discovery endpoints
  version: 1.0.0
  contact:
    name: Plexus
servers:
  - url: http://localhost:4000
    description: Local development server

security:
  - bearerAuth: []
  - apiKeyHeader: []
  - googleApiKeyHeader: []
  - apiKeyQuery: []

tags:
  - name: Health & Discovery
    description: Health checks and OAuth/OIDC discovery
  - name: Inference
    description: OpenAI, Anthropic, and Gemini-compatible inference endpoints
  - name: Model Management
    description: List and search available models
  - name: Management
    description: Administrative API for configuration, usage, and monitoring
  - name: Quotas
    description: Provider-level quota monitoring
  - name: MCP Proxy
    description: Model Context Protocol server proxying

paths:
  # ─── Health & Discovery ─────────────────────────────────────────────────
  /health:
    get:
      tags:
        - Health & Discovery
      summary: Health check
      description: Returns `OK` if the server is running.
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /.well-known/oauth-authorization-server:
    get:
      tags:
        - Health & Discovery
      summary: OAuth authorization server metadata
      description: Returns OAuth 2.0 authorization server metadata
      security: []
      responses:
        '200':
          description: OAuth server metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string
                  token_endpoint_auth_methods_supported:
                    type: array
                    items:
                      type: string
                  resource_supported:
                    type: boolean

  /.well-known/oauth-protected-resource:
    get:
      tags:
        - Health & Discovery
      summary: OAuth protected resource metadata
      description: Returns OAuth 2.0 protected resource metadata
      security: []
      responses:
        '200':
          description: Protected resource metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: string
                  authorization_servers:
                    type: array
                    items:
                      type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  bearer_methods_supported:
                    type: array
                    items:
                      type: string

  /.well-known/openid-configuration:
    get:
      tags:
        - Health & Discovery
      summary: OpenID Connect configuration
      description: Returns OpenID Connect discovery metadata
      security: []
      responses:
        '200':
          description: OpenID configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  jwks_uri:
                    type: string
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  id_token_signing_alg_values_supported:
                    type: array
                    items:
                      type: string

  /register:
    post:
      tags:
        - Health & Discovery
      summary: Dynamic client registration
      description: OAuth dynamic client registration endpoint
      security: []
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_id_issued_at:
                    type: integer
                  client_secret:
                    type: string
                  grant_types:
                    type: array
                    items:
                      type: string
                  token_endpoint_auth_method:
                    type: string

  # ─── Inference APIs ──────────────────────────────────────────────────
  /v1/chat/completions:
    post:
      tags:
        - Inference
      summary: Chat completions (OpenAI-compatible)
      description: |
        Compatible with the OpenAI Chat Completions API. Supports streaming via
        `stream: true` in the request body.

        See [OpenAI Chat Completions Reference](https://platform.openai.com/docs/api-reference/chat)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Successful completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: Server-sent events for streaming responses
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/messages:
    post:
      tags:
        - Inference
      summary: Messages (Anthropic-compatible)
      description: |
        Compatible with the Anthropic Messages API.

        See [Anthropic Messages Reference](https://docs.anthropic.com/en/api/messages)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Successful message response
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/responses:
    post:
      tags:
        - Inference
      summary: Responses (OpenAI Responses API)
      description: |
        Compatible with the OpenAI Responses API. Supports multi-turn conversations
        via `previous_response_id`, tool use, and reasoning. Plexus stores response
        state server-side so clients only need to send new input and a reference to
        the previous response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/responses/{response_id}:
    get:
      tags:
        - Inference
      summary: Retrieve a stored response
      description: Retrieves a previously stored response by ID.
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved response
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Response not found

    delete:
      tags:
        - Inference
      summary: Delete a stored response
      description: Deletes a stored response.
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Response not found

  /v1/codex/responses:
    post:
      tags:
        - Inference
      summary: Codex Responses
      description: |
        Codex CLI sends requests to `/v1/codex/responses` — this is an alias to
        the same handler as `/v1/responses`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/conversations/{conversation_id}:
    get:
      tags:
        - Inference
      summary: Get conversation
      description: Retrieves all items in a stored conversation thread.
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved conversation
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Conversation not found

  /v1beta/models/{modelWithAction}:
    post:
      tags:
        - Inference
      summary: Gemini-compatible endpoint
      description: |
        Compatible with the Google Generative Language API (Gemini).
        Supported Actions: `generateContent`, `streamGenerateContent`

        See [Gemini API Reference](https://ai.google.dev/api/rest/v1beta/models/generateContent)
      parameters:
        - name: modelWithAction
          in: path
          required: true
          schema:
            type: string
            example: gemini-pro:generateContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/embeddings:
    post:
      tags:
        - Inference
      summary: Create embeddings
      description: |
        Compatible with the OpenAI Embeddings API. Works with any provider that
        supports OpenAI-compatible embeddings.

        Models must be configured with `type: embeddings`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingsRequest'
      responses:
        '200':
          description: Embeddings generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/audio/transcriptions:
    post:
      tags:
        - Inference
      summary: Create transcription
      description: |
        Compatible with the OpenAI Audio Transcriptions API. Accepts `multipart/form-data`
        with audio files.

        Supported Formats: mp3, mp4, mpeg, mpga, m4a, ogg, wav, webm (max 25 MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                model:
                  type: string
                language:
                  type: string
                prompt:
                  type: string
                response_format:
                  type: string
                  enum: [json, text, verbose_json]
                  default: json
                temperature:
                  type: number
      responses:
        '200':
          description: Transcription result
          content:
            application/json:
              schema:
                type: object
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/audio/speech:
    post:
      tags:
        - Inference
      summary: Create speech
      description: |
        Compatible with the OpenAI Audio Speech API. Generates audio from text.

        Voices: alloy, ash, ballad, coral, echo, fable, onyx, nova, sage, shimmer,
        verse, marin, cedar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechRequest'
      responses:
        '200':
          description: Audio response
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/images/generations:
    post:
      tags:
        - Inference
      summary: Create image
      description: Compatible with the OpenAI Images Generation API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGenerationRequest'
      responses:
        '200':
          description: Generated image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/images/edits:
    post:
      tags:
        - Inference
      summary: Edit image
      description: |
        Compatible with the OpenAI Images Edit API. Accepts `multipart/form-data`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: PNG file, < 4 MB
                prompt:
                  type: string
                mask:
                  type: string
                  format: binary
                  description: PNG mask (transparent = edit here)
                model:
                  type: string
                n:
                  type: integer
                  minimum: 1
                  maximum: 10
                size:
                  type: string
                  enum: ['256x256', '512x512', '1024x1024']
                response_format:
                  type: string
                  enum: [url, b64_json]
                quality:
                  type: string
                  enum: [standard, high, medium, low]
                user:
                  type: string
      responses:
        '200':
          description: Edited image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ─── Model Management ────────────────────────────────────────────────
  /v1/models:
    get:
      tags:
        - Model Management
      summary: List models
      description: |
        Returns all configured model aliases. When an alias has metadata configured
        in the database, the response includes enriched fields following the
        OpenRouter model format.
      security: []
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'

  /v1/openrouter/models:
    get:
      tags:
        - Model Management
      summary: List OpenRouter models
      description: Returns models fetched from OpenRouter.
      security: []
      responses:
        '200':
          description: List of OpenRouter model slugs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer

  /v1/metadata/search:
    get:
      tags:
        - Model Management
      summary: Search model metadata
      description: |
        Search a loaded metadata catalog for use in the admin UI autocomplete when
        assigning metadata to an alias.
      security: []
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [openrouter, models.dev, catwalk]
        - name: q
          in: query
          schema:
            type: string
          description: Substring search string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                  count:
                    type: integer
        '400':
          description: Invalid source parameter
        '503':
          description: Source not loaded

  /v1/metadata/lookup:
    get:
      tags:
        - Model Management
      summary: Lookup model metadata
      description: Return the full normalized metadata for a single model in a catalog source.
      security: []
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [openrouter, models.dev, catwalk]
        - name: source_path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Invalid parameters
        '404':
          description: Model not found
        '503':
          description: Source not loaded

  # ─── Management Auth ─────────────────────────────────────────────────
  /v0/management/auth/verify:
    get:
      tags:
        - Management
      summary: Verify admin key
      description: Validates the provided `x-admin-key` against `ADMIN_KEY`.
      security:
        - adminKey: []
      parameters:
        - name: x-admin-key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key is valid
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok:
                        type: boolean
                      role:
                        type: string
                        enum: [admin]
                  - type: object
                    properties:
                      ok:
                        type: boolean
                      role:
                        type: string
                        enum: [limited]
                      keyName:
                        type: string
                      allowedProviders:
                        type: array
                        items:
                          type: string
                      allowedModels:
                        type: array
                        items:
                          type: string
                      quotaName:
                        type: string
                        nullable: true
                      comment:
                        type: string
                        nullable: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ─── Configuration Management ────────────────────────────────────────
  /v0/management/config:
    get:
      tags:
        - Management
      summary: Get current configuration
      description: Returns the current configuration from the database (originally imported from `plexus.yaml`).
      security:
        - adminKey: []
      responses:
        '200':
          description: Current configuration

  /v0/management/config/export:
    get:
      tags:
        - Management
      summary: Export configuration as JSON
      description: Returns the configuration as JSON.
      security:
        - adminKey: []
      responses:
        '200':
          description: Configuration JSON
          content:
            application/json:
              schema:
                type: object

  /v0/management/config/status:
    get:
      tags:
        - Management
      summary: Get config status
      description: Returns configuration status including whether ADMIN_KEY was loaded from YAML.
      security:
        - adminKey: []
      responses:
        '200':
          description: Config status
          content:
            application/json:
              schema:
                type: object
                properties:
                  adminKeyFromYaml:
                    type: boolean

  /v0/management/providers:
    get:
      tags:
        - Management
      summary: List all providers
      description: Returns all configured providers.
      security:
        - adminKey: []
      responses:
        '200':
          description: List of providers

  /v0/management/providers/{providerId}:
    get:
      tags:
        - Management
      summary: Get provider by ID
      description: Returns a specific provider configuration.
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider configuration
        '404':
          description: Provider not found

    put:
      tags:
        - Management
      summary: Create or replace provider
      description: Creates or replaces a provider configuration.
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderConfig'
      responses:
        '200':
          description: Provider saved
        '400':
          description: Validation failed

    patch:
      tags:
        - Management
      summary: Partially update provider
      description: Partially updates a provider configuration.
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Provider updated
        '400':
          description: Validation failed
        '404':
          description: Provider not found

    delete:
      tags:
        - Management
      summary: Delete provider
      description: Deletes a provider configuration.
      security:
        - adminKey: []
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
        - name: cascade
          in: query
          schema:
            type: boolean
          description: Also remove all model targets that reference this provider
      responses:
        '200':
          description: Provider deleted
        '404':
          description: Provider not found

  /v0/management/aliases:
    get:
      tags:
        - Management
      summary: List all model aliases
      description: Returns all configured model aliases.
      security:
        - adminKey: []
      responses:
        '200':
          description: List of aliases

  /v0/management/aliases/{aliasId}:
    put:
      tags:
        - Management
      summary: Create or replace model alias
      description: Creates or replaces a model alias configuration.
      security:
        - adminKey: []
      parameters:
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelConfig'
      responses:
        '200':
          description: Alias saved
        '400':
          description: Validation failed

    patch:
      tags:
        - Management
      summary: Partially update model alias
      description: Partially updates a model alias configuration.
      security:
        - adminKey: []
      parameters:
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Alias updated
        '400':
          description: Validation failed
        '404':
          description: Alias not found

  /v0/management/models/{aliasId}:
    delete:
      tags:
        - Management
      summary: Delete model alias
      description: Deletes a model alias configuration.
      security:
        - adminKey: []
      parameters:
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Alias deleted
        '404':
          description: Alias not found

  /v0/management/models:
    delete:
      tags:
        - Management
      summary: Delete all model aliases
      description: Deletes all model aliases.
      security:
        - adminKey: []
      responses:
        '200':
          description: Aliases deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deletedCount:
                    type: integer

  /v0/management/keys:
    get:
      tags:
        - Management
      summary: List all API keys
      description: Returns all configured API keys.
      security:
        - adminKey: []
      responses:
        '200':
          description: List of keys

  /v0/management/keys/{name}:
    put:
      tags:
        - Management
      summary: Create or replace API key
      description: Creates or replaces an API key configuration.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyConfig'
      responses:
        '200':
          description: Key saved
        '400':
          description: Validation failed

    delete:
      tags:
        - Management
      summary: Delete API key
      description: Deletes an API key.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key deleted
        '404':
          description: Key not found

  /v0/management/system-settings:
    get:
      tags:
        - Management
      summary: Get system settings
      description: Returns all system settings.
      security:
        - adminKey: []
      responses:
        '200':
          description: System settings

    patch:
      tags:
        - Management
      summary: Update system settings
      description: Updates system settings with the provided values.
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Settings updated
        '400':
          description: Invalid request

  /v0/management/config/vision-fallthrough:
    get:
      tags:
        - Management
      summary: Get vision fallthrough settings
      description: Returns the vision fallthrough configuration.
      security:
        - adminKey: []
      responses:
        '200':
