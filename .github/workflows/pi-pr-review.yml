name: Pi PR Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (for bot-created PRs)'
        required: true
        type: string

jobs:
  review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Get PR info for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: get-pr
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ github.event.inputs.pr_number }}')
            });
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('body', pr.body || '');

      - name: Create PR check for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: create-check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Pi PR Review',
              head_sha: '${{ steps.get-pr.outputs.head_sha }}',
              status: 'in_progress',
              started_at: new Date().toISOString()
            });
            core.setOutput('check_id', check.id);

      - name: Require PR body
        if: |
          (github.event_name == 'pull_request_target' && github.event.pull_request.body == '') ||
          (github.event_name == 'workflow_dispatch' && steps.get-pr.outputs.body == '')
        run: |
          echo "::error::Pull requests must include a description. Please add a body to this PR."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || steps.get-pr.outputs.head_repo_full_name }}
          ref: ${{ github.event.pull_request.head.sha || steps.get-pr.outputs.head_sha }}

      - name: Run pi PR review
        uses: mcowger/pi-action@main
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_models_json: ${{ secrets.PI_MODELS_JSON }}
          share_session: false
          pr_number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number || '' }}
          prompt_template_file: '.github/pi-prompts/pr-review.md'

      - name: Update PR check to complete
        if: github.event_name == 'workflow_dispatch' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: '${{ steps.create-check.outputs.check_id }}',
              status: 'completed',
              conclusion: conclusion,
              completed_at: new Date().toISOString()
            });
