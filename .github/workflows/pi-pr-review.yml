name: Pi PR Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: mcowger/pi-coding-agent-action@mcowger/baseurl
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          token: ${{ secrets.OPENROUTER_API_KEY }}
          base_url: ${{ secrets.PLEXUS_URL }}
          prompt: >
            Review this pull request. Check for bugs, logic errors, security issues,
            and missing test coverage. Note any style or documentation concerns but
            focus on substantive problems. Post your findings as a PR review comment.
