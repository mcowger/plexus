name: Build Binaries
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag"

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            compile_cmd: bun run compile:linux-amd64
            artifact_name: plexus-linux-amd64
          - target: linux-arm64
            compile_cmd: bun run compile:linux-arm64
            artifact_name: plexus-linux-arm64
          - target: macos
            compile_cmd: bun run compile:macos
            artifact_name: plexus-macos
          - target: windows
            compile_cmd: bun run compile:windows
            artifact_name: plexus.exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile binary
        env:
          APP_VERSION: ${{ inputs.tag }}
        run: |
          # Build frontend first for embedding
          bun run build:frontend
          ${{ matrix.compile_cmd }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1
