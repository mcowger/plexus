name: Pi Coding Agent

# The Pi Coding Agent action is configured via repository secrets and variables:
#
#   Secrets:
#     PLEXUS_API_KEY   — API key for the proxy
#     PLEXUS_BASE_URL  — Proxy URL (e.g. https://ai.home.cowger.us/v1)
#
#   Variables:
#     PLEXUS_MODEL       — Main work model; must be a name known to the
#                          overridden provider (openrouter), e.g.
#                          anthropic/claude-sonnet-4-5 or z-ai/glm-4.6
#     PLEXUS_SMALL_MODEL — Fast/classification model (same constraint)
#
# The pi-env-var-provider extension is used in Mode 2 (override): it rewires
# the built-in "openrouter" provider's baseUrl to PLEXUS_BASE_URL so requests
# are routed through the Plexus proxy while keeping openrouter's built-in
# model list.
# Mode 1 (new provider) does not work here because pi-coding-agent-action
# resolves the model in the Agent constructor BEFORE extensions are loaded.
#
# Trigger with: @pi in comments, PR reviews, or issue bodies
#
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  pi:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@pi')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@pi')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@pi')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@pi') || contains(github.event.issue.title, '@pi')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run Pi Coding Agent
        id: pi
        uses: shaftoe/pi-coding-agent-action@v2
        env:
          PI_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          PI_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PI_OVERRIDE_PROVIDER: openrouter
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          token: ${{ secrets.PLEXUS_API_KEY }}
          thinking_level: low
          trigger: '@pi'
          extensions: |
            git:github.com/mcowger/pi-env-var-provider
          load_builtin_extensions: true

  # Automated PR code review (no trigger required)
  pi-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for proper diff analysis

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run automated PR review
        id: pi-review
        uses: shaftoe/pi-coding-agent-action@v2
        env:
          PI_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          PI_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PI_OVERRIDE_PROVIDER: openrouter
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          token: ${{ secrets.PLEXUS_API_KEY }}
          thinking_level: high
          prompt: 'Review this pull request for code quality, security issues, potential bugs, and provide constructive feedback. Focus on the changes introduced in this PR.'
          extensions: |
            git:github.com/mcowger/pi-env-var-provider
          load_builtin_extensions: true
