name: Check No Migrations in PR

on:
  pull_request:
    paths:
      - 'packages/backend/drizzle/migrations/**'
      - 'packages/backend/drizzle/migrations_pg/**'

jobs:
  check-migrations:
    name: Block migration files in PR
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'migrations-ok') }}
    steps:
      - name: Check author association
        id: author-check
        run: |
          ASSOC="${{ github.event.pull_request.author_association }}"
          SENDER="${{ github.event.pull_request.user.login }}"
          echo "association=$ASSOC" >> "$GITHUB_OUTPUT"
          if [[ "$ASSOC" == "COLLABORATOR" || "$ASSOC" == "OWNER" || "$ASSOC" == "MEMBER" || "$SENDER" == "app/github-actions" || "$SENDER" == "github-actions[bot]" ]]; then
            echo "is_internal=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_internal=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject migration files
        if: steps.author-check.outputs.is_internal == 'false'
        run: |
          echo "::error::This PR modifies migration files (drizzle/migrations/ or drizzle/migrations_pg/)."
          echo ""
          echo "Community PRs should only modify schema .ts files in drizzle/schema/."
          echo "Migrations are auto-generated after merge by CI."
          echo ""
          echo "To test locally: run 'bun run generate-migrations' but do not commit the output."
          echo "If this is a maintainer PR that intentionally includes migrations, add the 'migrations-ok' label."
          exit 1

      - name: Warn about migration files
        if: steps.author-check.outputs.is_internal == 'true'
        run: |
          echo "::warning::This PR modifies migration files (drizzle/migrations/ or drizzle/migrations_pg/)."
          echo ""
          echo "Migrations are normally auto-generated by CI after merge."
          echo "If this is intentional, no further action is needed."
          echo "Otherwise, remove the migration files and only modify schema .ts files in drizzle/schema/."
