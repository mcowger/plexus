name: Release Trigger

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]+'  # CalVer: YYYY.MM.DD.N

jobs:
  dispatch-release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger release workflow
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            console.log(`Tag push detected: ${tag}`);
            console.log('Triggering release workflow via workflow_dispatch...');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                version: tag
              }
            });
            console.log('Release workflow triggered successfully.');
