name: Claude Assistant
run-name: ${{ github.event.issue.title || github.event.pull_request.title || 'Claude Assistant' }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  claude-agent:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || '' }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.CLAUDE_SMALL_MODEL }}

        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "Read,Write,Edit,Replace,Bash(*),Grep,Glob,TaskOutput,KillTask,mcp__*"
          path_to_bun_executable: /home/runner/.bun/bin/bun
          additional_permissions: |
            actions: read
          show_full_output: true
          display_report: true
          use_sticky_comment: true
          include_fix_links: true
          track_progress: true
