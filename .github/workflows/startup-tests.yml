name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------------ #
  #  Unit Tests                                                          #
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/backend

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/frontend

      - name: Run unit tests
        run: bun test --verbose --workers=1
        working-directory: ./packages/backend

  # ------------------------------------------------------------------ #
  #  Binary Startup Test                                                 #
  # ------------------------------------------------------------------ #
  binary-startup:
    name: Binary Startup Test
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/backend

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: ./packages/frontend

      - name: Compile Linux binary
        # compile:linux also builds the frontend first
        run: bun run compile:linux

      - name: Run binary startup test
        run: bash scripts/test-startup-binary.sh

  # ------------------------------------------------------------------ #
  #  Docker Startup Test                                                 #
  # ------------------------------------------------------------------ #
  docker-startup:
    name: Docker Startup Test
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: plexus-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker startup test
        run: bash scripts/test-startup-docker.sh plexus-test:latest
