name: PR Tests
run-name: "PR: ${{ github.event.pull_request.title || format('PR #{0}', github.event.inputs.pr_number) }}"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (for bot-created PRs)'
        required: true
        type: string
      requested_by:
        description: 'Workflow that requested this run'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Get PR info for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        id: get-pr
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ github.event.inputs.pr_number }}')
            });
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo_full_name', pr.head.repo.full_name);

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || steps.get-pr.outputs.head_repo_full_name }}
          ref: ${{ github.event.pull_request.head.sha || steps.get-pr.outputs.head_sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build:frontend

      - name: Typecheck all workspaces
        run: bun run typecheck
        continue-on-error: true

      - name: Run backend tests
        run: cd packages/backend && bun run test:force-all

  record-dispatch-check:
    name: Record workflow_dispatch check
    needs: test
    if: github.event_name == 'workflow_dispatch' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - name: Create completed PR check
        if: github.event_name == 'workflow_dispatch' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ github.event.inputs.pr_number }}')
            });

            const result = '${{ needs.test.result }}';
            const conclusion = result === 'success'
              ? 'success'
              : result === 'cancelled'
                ? 'cancelled'
                : result === 'skipped'
                  ? 'skipped'
                  : 'failure';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'PR Tests',
              head_sha: pr.head.sha,
              status: 'completed',
              conclusion: conclusion,
              started_at: new Date().toISOString(),
              completed_at: new Date().toISOString()
            });

