name: PR Tests and Review
run-name: "PR: ${{ github.event.pull_request.title }}"

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  id-token: write
  actions: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun run install:all

      - name: Build frontend
        run: bun run build:frontend

      - name: Typecheck all workspaces
        run: bun run typecheck
        continue-on-error: true

      - name: Run backend tests
        run: cd packages/backend && bun run test

  claude-review:
    name: Claude Code Review
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create in-progress check run
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Claude Code Review',
              head_sha: '${{ github.event.pull_request.head.sha }}',
              status: 'in_progress',
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            core.setOutput('check_id', check.id);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run Claude Code Review
        id: claude-review
        uses: mcowger/claude-code-expanded@main
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          claude_args: '--model ${{ vars.PLEXUS_MODEL }}'
          settings: |
            {
              "permissions": {
                "allow": [
                  "mcp__github_inline_comment__*",
                  "mcp__github_comment__*",
                  "Bash(*)",
                  "Bash(git:*)"
                ]
              }
            }
          prompt: |
            Review the pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }}.

            1. Read the PR diff using `git diff` and understand the changes.
            2. Analyze the code for bugs, security issues, performance problems, and style concerns.
            3. Post inline comments on specific lines using mcp__github_inline_comment__create_inline_comment with confirmed: true.
            4. Post a summary review comment on the PR using `gh pr comment`.

            Be thorough but concise. Focus on actionable issues, not nitpicks.

      - name: Update check run result
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const success = '${{ steps.claude-review.outcome }}' === 'success';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.check.outputs.check_id }},
              status: 'completed',
              conclusion: success ? 'success' : 'failure',
            });
