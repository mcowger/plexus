name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]+'  # CalVer: YYYY.MM.DD.N

# NOTE: This workflow now uses our forked claude-code-action which supports
# the 'push' event. Previously, we needed release-trigger.yml to convert
# tag pushes to workflow_dispatch events due to upstream's event restrictions.

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Get tag from ref
        id: release_tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for pending migrations
        working-directory: packages/backend
        run: |
          # Run drizzle-kit generate in dry-run mode to detect schema drift.
          bunx drizzle-kit generate 2>&1 | tee /tmp/sqlite-migrate.log
          bunx drizzle-kit generate --config drizzle.config.postgres.ts 2>&1 | tee /tmp/pg-migrate.log

          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard drizzle/migrations drizzle/migrations_pg)" ]; then
            echo "✅ No pending migrations"
          else
            echo "::error::Pending migrations detected! Wait for generate-migrations workflow."
            exit 1
          fi

      - name: Compile Binaries
        env:
          APP_VERSION: ${{ steps.release_tag.outputs.tag }}
        run: |
          bun run compile:linux
          bun run compile:macos
          bun run compile:windows

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.release_tag.outputs.tag }}

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.release_tag.outputs.tag }}"
          CURRENT_SHA=$(git rev-parse "${CURRENT_TAG}^{}")

          # Find the previous tag that is an actual ancestor
          PREV_TAG=""
          for tag in $(git tag --sort=-version:refname --list "[0-9]*.[0-9]*.[0-9]*.[0-9]*" "v*.*.*" 2>/dev/null); do
            if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
            tag_sha=$(git rev-parse "${tag}^{}" 2>/dev/null || true)
            [ -z "$tag_sha" ] && continue
            if git merge-base --is-ancestor "$tag_sha" "$CURRENT_SHA" 2>/dev/null; then
              PREV_TAG="$tag"
              break
            fi
          done

          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Gather PR and commit info between tags
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const prevTag = '${{ steps.prev_tag.outputs.tag }}';
            const currentTag = '${{ steps.prev_tag.outputs.current_tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { execSync } = require('child_process');
            let commits;
            try {
              commits = execSync(`git log ${prevTag}..${currentTag} --pretty=format:'%H'`, { encoding: 'utf8' }).trim().split('\n');
            } catch (e) {
              commits = [];
            }

            if (commits.length === 0 || (commits.length === 1 && commits[0] === '')) {
              core.setOutput('pr_summary', 'No commits found between tags.');
              return;
            }

            const prMap = new Map();
            const standaloneCommits = [];

            for (const sha of commits) {
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha
                });
                if (prs.length > 0) {
                  const pr = prs[0];
                  if (!prMap.has(pr.number)) {
                    prMap.set(pr.number, {
                      number: pr.number,
                      title: pr.title,
                      url: pr.html_url,
                      author: pr.user?.login || '',
                      authorUrl: pr.user?.html_url || '',
                      commits: []
                    });
                  }
                  prMap.get(pr.number).commits.push(sha.substring(0, 7));
                } else {
                  const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                  const author = execSync(`git log -1 --pretty=format:'%an' ${sha}`, { encoding: 'utf8' }).trim();
                  standaloneCommits.push({
                    sha: sha.substring(0, 7),
                    message: msg,
                    author: author,
                    url: `https://github.com/${owner}/${repo}/commit/${sha}`
                  });
                }
              } catch (e) {
                const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                standaloneCommits.push({
                  sha: sha.substring(0, 7),
                  message: msg,
                  author: '',
                  url: `https://github.com/${owner}/${repo}/commit/${sha}`
                });
              }
            }

            let summary = '';
            if (prMap.size > 0) {
              summary += '## Pull Requests\n\n';
              for (const [number, pr] of prMap) {
                summary += `- PR #${number}: ${pr.title} (${pr.url}) by @${pr.author} [${pr.commits.length} commit(s): ${pr.commits.join(', ')}]\n`;
              }
              summary += '\n';
            }
            if (standaloneCommits.length > 0) {
              summary += '## Direct Commits (no associated PR)\n\n';
              for (const c of standaloneCommits) {
                summary += `- ${c.sha}: ${c.message} (${c.url})`;
                if (c.author) summary += ` by ${c.author}`;
                summary += '\n';
              }
            }

            core.setOutput('pr_summary', summary);

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Generate Release Notes with Claude
        id: release_notes
        timeout-minutes: 5
        uses: mcowger/claude-code-expanded@main
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            You are a technical writer creating release notes for a software project called Plexus, an LLM API gateway.

            ## Source Changes

            ${{ steps.pr_info.outputs.pr_summary }}

            ---

            ## Instructions:

            Generate release notes following this exact structure. Start IMMEDIATELY with the version heading:

            ## ${{ steps.release_tag.outputs.tag }}

            ### New Features (if any)
            [Narrative prose about notable features]

            ### Added / Changed / Fixed / Security
            [Categorized bullets with PR references]

          claude_args: |
            --model ${{ vars.PLEXUS_MODEL }}
            --allowedTools "Bash(git:*)",Read

      - name: Debug claude-code-action outputs
        if: always()
        run: |
          echo "release_notes outcome: ${{ steps.release_notes.outcome }}"
          echo "execution_file: ${{ steps.release_notes.outputs.execution_file }}"

      - name: Extract release notes text
        id: extract_notes
        if: steps.release_notes.outcome == 'success'
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const executionFilePath = '${{ steps.release_notes.outputs.execution_file }}';
            if (!executionFilePath) {
              core.warning('No execution_file output');
              return '';
            }
            const fs = require('fs');
            if (!fs.existsSync(executionFilePath)) {
              core.warning('Execution file not found: ' + executionFilePath);
              return '';
            }
            const executionLog = JSON.parse(fs.readFileSync(executionFilePath, 'utf8'));
            const result = executionLog[executionLog.length - 1].result;
            return result || '';

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            plexus-linux
            plexus-macos
            plexus.exe
          draft: false
          prerelease: false
          body: ${{ steps.extract_notes.outputs.result || steps.pr_info.outputs.pr_summary }}
