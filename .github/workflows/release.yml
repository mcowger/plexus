name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile Binaries
        # compiling each platform separately
        # Note: Each compile script in package.json runs build:frontend. 
        # This is acceptable for correctness to ensure each binary is built with the latest assets.
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          bun run compile:linux
          bun run compile:macos
          bun run compile:windows

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${GITHUB_REF##*/}"
          PREV_TAG=$(git tag --sort=-version:refname --list "v*.*.*" | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: release_notes
        uses: mistricky/ccc@v0.2.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          from_tag: ${{ steps.prev_tag.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plexus-linux
            plexus-macos
            plexus.exe
          draft: false
          prerelease: false
          body: ${{ steps.release_notes.outputs.result }}
