name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9].[0-9]+'  # CalVer: YYYY.MM.DD.N
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag to publish (will be created on main if it doesn't exist)"

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/release-setup.yml
    with:
      tag: ${{ inputs.tag }}

  quality-gates:
    name: Quality Gates
    needs: setup
    uses: ./.github/workflows/release-quality-gates.yml

  generate-release-notes:
    name: Generate Release Notes
    needs: setup
    uses: ./.github/workflows/release-notes.yml
    with:
      tag: ${{ needs.setup.outputs.tag }}
    secrets: inherit
    continue-on-error: true

  build-binaries:
    name: Build Binaries
    needs: [setup, quality-gates]
    uses: ./.github/workflows/release-build-binaries.yml
    with:
      tag: ${{ needs.setup.outputs.tag }}

  build-docker:
    name: Build Docker Image
    needs: [setup, quality-gates]
    uses: ./.github/workflows/release-build-docker.yml
    with:
      tag: ${{ needs.setup.outputs.tag }}

  release:
    name: Create Release
    needs: [setup, build-binaries, build-docker, generate-release-notes]
    uses: ./.github/workflows/release-publish.yml
    with:
      tag: ${{ needs.setup.outputs.tag }}
      release_notes: ${{ needs.generate-release-notes.outputs.notes }}
