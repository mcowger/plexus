name: Release
run-name: Release ${{ inputs.version || github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.version || '' }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for pending migrations
        working-directory: packages/backend
        run: |
          # Run drizzle-kit generate in dry-run mode to detect schema drift.
          # If any migration files are produced, the schema has changed since
          # the last migration was committed — the release must wait for the
          # generate-migrations workflow to catch up.
          bunx drizzle-kit generate 2>&1 | tee /tmp/sqlite-migrate.log
          bunx drizzle-kit generate --config drizzle.config.postgres.ts 2>&1 | tee /tmp/pg-migrate.log

          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard drizzle/migrations drizzle/migrations_pg)" ]; then
            echo "✅ No pending migrations — all schema changes have corresponding migration files."
          else
            echo "::error::Pending migrations detected! The schema has changed but migration files have not been generated yet."
            echo ""
            echo "This usually means the generate-migrations workflow has not finished running on main."
            echo "Wait for it to complete and merge, then re-tag the release."
            echo ""
            echo "Uncommitted migration files:"
            git ls-files --others --exclude-standard drizzle/migrations drizzle/migrations_pg
            echo ""
            echo "Modified migration files:"
            git diff --name-only
            exit 1
          fi

      - name: Compile Binaries
        # compiling each platform separately
        # Note: Each compile script in package.json runs build:frontend. 
        # This is acceptable for correctness to ensure each binary is built with the latest assets.
        env:
          APP_VERSION: ${{ steps.release_tag.outputs.tag }}
        run: |
          bun run compile:linux
          bun run compile:macos
          bun run compile:windows

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.release_tag.outputs.tag }}

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ steps.release_tag.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname --list "v*.*.*" | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

      - name: Gather PR and commit info between tags
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const prevTag = '${{ steps.prev_tag.outputs.tag }}';
            const currentTag = '${{ steps.prev_tag.outputs.current_tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get the commit SHAs between the two tags
            const { execSync } = require('child_process');
            let commits;
            try {
              commits = execSync(`git log ${prevTag}..${currentTag} --pretty=format:'%H'`, { encoding: 'utf8' }).trim().split('\n');
            } catch (e) {
              commits = [];
            }

            if (commits.length === 0 || (commits.length === 1 && commits[0] === '')) {
              core.setOutput('pr_summary', 'No commits found between tags.');
              return;
            }

            // Find associated PRs for each commit
            const prMap = new Map(); // pr number -> { title, url, author, commits: [] }
            const standaloneCommits = [];

            for (const sha of commits) {
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha
                });
                if (prs.length > 0) {
                  const pr = prs[0]; // Use the first (most relevant) PR
                  if (!prMap.has(pr.number)) {
                    prMap.set(pr.number, {
                      number: pr.number,
                      title: pr.title,
                      url: pr.html_url,
                      author: pr.user?.login || '',
                      authorUrl: pr.user?.html_url || '',
                      mergedAt: pr.merged_at,
                      commits: []
                    });
                  }
                  prMap.get(pr.number).commits.push(sha.substring(0, 7));
                } else {
                  // Standalone commit (not from a PR)
                  const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                  const author = execSync(`git log -1 --pretty=format:'%an' ${sha}`, { encoding: 'utf8' }).trim();
                  standaloneCommits.push({
                    sha: sha.substring(0, 7),
                    shaFull: sha,
                    message: msg,
                    author: author,
                    url: `https://github.com/${owner}/${repo}/commit/${sha}`
                  });
                }
              } catch (e) {
                // API rate limit or other error, treat as standalone
                const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                standaloneCommits.push({
                  sha: sha.substring(0, 7),
                  shaFull: sha,
                  message: msg,
                  author: '',
                  url: `https://github.com/${owner}/${repo}/commit/${sha}`
                });
              }
            }

            // Build the summary text for the prompt
            let summary = '';
            if (prMap.size > 0) {
              summary += '## Pull Requests\n\n';
              for (const [number, pr] of prMap) {
                summary += `- PR #${number}: ${pr.title} (${pr.url}) by @${pr.author}`;
                if (pr.authorUrl) summary += ` (${pr.authorUrl})`;
                summary += ` [${pr.commits.length} commit(s): ${pr.commits.join(', ')}]\n`;
              }
              summary += '\n';
            }
            if (standaloneCommits.length > 0) {
              summary += '## Direct Commits (no associated PR)\n\n';
              for (const c of standaloneCommits) {
                summary += `- ${c.sha}: ${c.message} (${c.url})`;
                if (c.author) summary += ` by ${c.author}`;
                summary += '\n';
              }
            }

            core.setOutput('pr_summary', summary);

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Generate Release Notes with Claude
        id: release_notes
        timeout-minutes: 5
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            You are a technical writer creating release notes for a software project called Plexus, an LLM API gateway.

            There are changes in the git repository between two releases:
            - From tag: ${{ steps.prev_tag.outputs.tag }}
            - To tag: ${{ steps.prev_tag.outputs.current_tag }}
            - Repository: https://github.com/${{ github.repository }}

            ## Source Changes

            ${{ steps.pr_info.outputs.pr_summary }}

            ---

            ## Instructions:

            Generate release notes following this exact structure and style:

            1. **Version heading**: Start with the version number as an `##` heading (e.g. `## v1.2.3`).

            2. **New Features & Changes section**: If there are any notable new features or significant changes, add a `### New Features` section BEFORE the categorized changelog. Write this as narrative prose — 1-3 sentences per feature explaining what it does and why it matters, without PR numbers or author attribution. Place each core item on its own line with a ' - ' the cause it to be shown in a list.   This is the "headline" that helps users quickly understand what's exciting in this release. Only include this section if there are genuinely noteworthy features — omit it entirely for small patch releases with only fixes.

            3. **Categorized sections**: After the New Features section, group changes into these standard categories (only include sections that have items):
               - `### Added` — New features and capabilities
               - `### Changed` — Changes in existing functionality
               - `### Deprecated` — Soon-to-be removed features
               - `### Removed` — Removed features
               - `### Fixed` — Bug fixes
               - `### Security` — Security improvements

            4. **Group by PR, not by commit**: If multiple commits came in via a single pull request, write only ONE bullet about the entire PR. Do NOT list each commit separately — use the PR title as the primary basis for the description, enriched by understanding the full set of commits.

            5. **Format each bullet as**: A concise, user-focused description ending with the PR or commit reference:
               - For PRs: `Added support for X (#123 by @username)` — always include the PR number and the `by @author` attribution.
               - For standalone commits (no PR): `Fixed issue with X (abc1234)` — use the short SHA.
               - If a change has no author info available, omit the `by @author` part.
               - Use plain text for the PR/commit reference, NOT markdown links (the release page auto-links `#123`).

            6. **Write clear, user-focused descriptions** that explain what changed and why it matters from a user's perspective. Start each bullet with an action verb when possible.

            ### Example output:

            ## v0.67.2

            ### New Features
            Support for multiple --append-system-prompt flags, each value is appended to the system prompt separated by double newlines.
            Interactive keybinding support for Kitty super-modified shortcuts such as super+k, super+enter, and ctrl+super+k.

            ### Added
            Added support for multiple --append-system-prompt flags (#3171 by @aliou)
            Added interactive keybinding support for Kitty super-modified shortcuts (#3111 by @sudosubin)

            ### Fixed
            Fixed streaming partial JSON buffers leaking into persisted tool calls (#3018 by @steipete)
            Fixed Ctrl+Alt letter key matching in tmux (#2989 by @kaofelix)

            Output ONLY the release notes in markdown format. Do NOT include any explanatory text, metadata, introductory phrases, or concluding remarks. Start IMMEDIATELY with the version heading. Do not preface your response with any text whatsoever.
          claude_args: |
            --model ${{ vars.PLEXUS_MODEL }}
            --allowedTools "Bash(git:*)",Read

      - name: Debug claude-code-action outputs
        if: always()
        run: |
          echo "release_notes outcome: ${{ steps.release_notes.outcome }}"
          echo "release_notes conclusion: ${{ steps.release_notes.outputs.conclusion }}"
          echo "execution_file: ${{ steps.release_notes.outputs.execution_file }}"
          echo "All output names: $(echo '${{ toJson(steps.release_notes.outputs) }}' | jq -r 'keys[]')"

      - name: Extract release notes text
        id: extract_notes
        if: steps.release_notes.outcome == 'success'
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const executionFilePath = '${{ steps.release_notes.outputs.execution_file }}';
            if (!executionFilePath) {
              core.warning('No execution_file output from claude-code-action. Falling back to pr_summary.');
              return '';
            }
            const fs = require('fs');
            if (!fs.existsSync(executionFilePath)) {
              core.warning(`Execution file not found: ${executionFilePath}. Falling back to pr_summary.`);
              return '';
            }
            const executionLog = JSON.parse(fs.readFileSync(executionFilePath, 'utf8'));
            const result = executionLog[executionLog.length - 1].result;
            if (!result || result.trim().length === 0) {
              core.warning('Claude returned empty result. Falling back to pr_summary.');
              return '';
            }
            return result;

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            plexus-linux
            plexus-macos
            plexus.exe
          draft: false
          prerelease: false
          body: ${{ steps.extract_notes.outputs.result || steps.pr_info.outputs.pr_summary }}
