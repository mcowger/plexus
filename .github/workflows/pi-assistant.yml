name: Pi Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    # Only trigger when the comment mentions @pi
    if: contains(github.event.comment.body, '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pi-action
        uses: mcowger/pi-action@main
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_auth_json: |
            {
              "openrouter": {"type": "api_key", "key": "PLEXUS_API_KEY"}
            }
          pi_models_json: |
            {
              "providers": {
                "openrouter": {
                  "baseUrl": "PLEXUS_BASE_URL",
                  "apiKey": "PLEXUS_API_KEY",
                  "api": "openai-completions",
                  "models": [
                    {
                      "id": "moonshotai/kimi-k2.5",
                      "name": "Kimi K2.5",
                      "reasoning": true,
                      "input": ["text", "image"],
                      "contextWindow": 262144,
                      "maxTokens": 65536
                    }
                  ]
                }
              }
            }
          share_session: false
