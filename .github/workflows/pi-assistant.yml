name: Pi Assistant

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    # Only trigger when the comment or issue/PR body mentions @pi
    if: contains(github.event.comment.body || github.event.issue.body || github.event.pull_request.body || '', '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write  # Needed for workflow_dispatch to trigger review/test workflows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PI_MODELS_JSON)
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}

      - name: Run pi-action
        id: pi-action
        uses: mcowger/pi-action@main
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_models_json: ${{ secrets.PI_MODELS_JSON }}
          share_session: false
        # Note: pi-action may have created a PR. We need to find it and dispatch
        # review/test workflows since GITHUB_TOKEN-created PRs don't trigger
        # pull_request_target events automatically.

      - name: Find created PR
        id: find-pr
        if: github.event_name == 'issue_comment' || github.event_name == 'issues'
        uses: actions/github-script@v9
        with:
          script: |
            // Search for PRs created by github-actions[bot] in the last few minutes
            // associated with this issue/comment
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 5
            });

            // Look for a PR created very recently by github-actions[bot]
            const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000);
            const botPr = pulls.find(pr =>
              pr.user.login === 'github-actions[bot]' &&
              new Date(pr.created_at) > fiveMinutesAgo
            );

            if (botPr) {
              core.setOutput('pr_number', botPr.number);
              core.info(`Found bot-created PR #${botPr.number}`);
            } else {
              core.info('No recently created bot PR found');
            }

      - name: Dispatch PR review workflow
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pi-pr-review.yml',
              ref: context.ref,
              inputs: {
                pr_number: '${{ steps.find-pr.outputs.pr_number }}',
                requested_by: 'pi-assistant'
              }
            });

      - name: Dispatch PR tests workflow
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-tests.yml',
              ref: context.ref,
              inputs: {
                pr_number: '${{ steps.find-pr.outputs.pr_number }}',
                requested_by: 'pi-assistant'
              }
            });
