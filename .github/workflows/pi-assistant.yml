name: Pi Assistant
run-name: ${{ github.event.issue.title || github.event.pull_request.title || 'Pi Assistant' }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-agent:
    if: contains(github.event.comment.body, '/pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || '' }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: mcowger/pi-coding-agent-action@refs/heads/v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          token: ${{ secrets.OPENROUTER_API_KEY }}
          base_url: ${{ secrets.PLEXUS_URL }}
          thinking_level: medium
          append_prompt: >
            Communication protocol: Post a SINGLE comment using
            `create_issue_comment` that acknowledges the request and includes a
            GitHub markdown checklist outlining your plan, for example:

              - [ ] Analyze the request
              - [ ] Implement the changes
              - [ ] Create a pull request

            Do NOT post a separate acknowledgment comment followed by a plan
            comment — combine them into one. As you complete each step, use
            `update_issue_comment` to check off items by changing `- [ ]` to
            `- [x]`. Do NOT use strikethrough or other formatting — use only
            `- [ ]` / `- [x]` checkbox syntax.

            Code changes: If the request involves any code changes — or if you
            make any modifications to files during your work — you MUST create a
            branch, commit the changes, and open a pull request using the
            `create_pull_request` tool. Changes that are not committed and
            submitted as a PR will be lost when this CI run ends. Never leave
            modified files uncommitted.

            When you create a pull request, update your progress comment to
            clearly announce it — include the PR number and link so the requester
            can easily find and review it.
