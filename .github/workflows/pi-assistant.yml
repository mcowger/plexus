name: Pi Assistant

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    # Only trigger when the comment or issue/PR body mentions @pi
    if: contains(github.event.comment.body || github.event.issue.body || github.event.pull_request.body || '', '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write  # Needed for workflow_dispatch to trigger review/test workflows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PI_MODELS_JSON)
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}

      - name: Run pi-action
        id: pi-action
        uses: mcowger/pi-action@main
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_models_json: ${{ secrets.PI_MODELS_JSON }}
          share_session: false
          # We need the PR number output so we can trigger subsequent workflows
          # (GITHUB_TOKEN-created PRs don't trigger pull_request_target events)

      - name: Dispatch PR review workflow
        if: steps.pi-action.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            // Trigger workflow_dispatch for pi-pr-review to run on the newly created PR
            // This is needed because GITHUB_TOKEN-created PRs don't trigger pull_request_target
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pi-pr-review.yml',
              ref: context.ref,
              inputs: {
                pr_number: '${{ steps.pi-action.outputs.pr_number }}',
                requested_by: 'pi-assistant'
              }
            });

      - name: Dispatch PR tests workflow
        if: steps.pi-action.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            // Trigger workflow_dispatch for pr-tests to run on the newly created PR
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-tests.yml',
              ref: context.ref,
              inputs: {
                pr_number: '${{ steps.pi-action.outputs.pr_number }}',
                requested_by: 'pi-assistant'
              }
            });
