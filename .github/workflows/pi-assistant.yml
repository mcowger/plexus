name: Pi Assistant
run-name: ${{ github.event.issue.title || github.event.pull_request.title || 'Pi Assistant' }}

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    # Only trigger when the comment or issue/PR body mentions @pi
    if: >-
      contains(github.event.comment.body || github.event.issue.body || github.event.pull_request.body || '', '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write  # Needed for workflow_dispatch to trigger review/test workflows

    steps:
      - name: Detect PR context
        id: detect-context
        uses: actions/github-script@v9
        with:
          script: |
            const eventName = '${{ github.event_name }}';
            
            // For pull_request_review_comment, we have direct access to PR
            if (eventName === 'pull_request_review_comment') {
              const pr = context.payload.pull_request;
              core.setOutput('is_pr', 'true');
              core.setOutput('branch', pr.head.ref);
              core.setOutput('mode', 'direct');
              core.info(`PR review comment on PR #${pr.number}, branch: ${pr.head.ref}`);
              return;
            }
            
            // For issue_comment, check if it's on a PR
            if (eventName === 'issue_comment') {
              const issue = context.payload.issue;
              if (issue.pull_request) {
                // This is a PR comment - fetch PR details
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: issue.number
                });
                core.setOutput('is_pr', 'true');
                core.setOutput('branch', pr.head.ref);
                core.setOutput('mode', 'direct');
                core.info(`PR issue comment on PR #${issue.number}, branch: ${pr.head.ref}`);
                return;
              }
            }
            
            // Not a PR comment
            core.setOutput('is_pr', 'false');
            core.setOutput('branch', '');
            core.setOutput('mode', 'branch');
            core.info('Not a PR comment, using branch mode');

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.detect-context.outputs.branch || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PI_MODELS_JSON)
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}

      - name: Run pi-action
        id: pi-action
        uses: mcowger/pi-action@main
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gist_token: ${{ secrets.PI_GIST_TOKEN }}
          provider: openrouter
          model: ${{ vars.PLEXUS_MODEL }}
          pi_models_json: ${{ secrets.PI_MODELS_JSON }}
          share_session: true
          prompt_template_file: '.github/pi-prompts/default-main.md'
          suppress_final_comment: true
          branch_mode: ${{ steps.detect-context.outputs.mode }}

      - name: Dispatch PR review workflow
        if: steps.pi-action.outputs.pr_created == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pi-pr-review.yml',
              ref: 'main',
              inputs: {
                pr_number: '${{ steps.pi-action.outputs.pr_number }}'
              }
            });

      - name: Dispatch PR tests workflow
        if: steps.pi-action.outputs.pr_created == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pr-tests.yml',
              ref: 'main',
              inputs: {
                pr_number: '${{ steps.pi-action.outputs.pr_number }}'
              }
            });
