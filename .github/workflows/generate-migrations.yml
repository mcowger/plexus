name: Generate Migrations

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/drizzle/schema/**/*.ts'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/drizzle/schema/**/*.ts'
  workflow_dispatch:

concurrency:
  group: generate-migrations
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd packages/backend && bun install --frozen-lockfile

      - name: Generate migrations
        run: bun run generate-migrations --name auto_schema_update

      - name: Check for new migrations
        id: check
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard packages/backend/drizzle/migrations packages/backend/drizzle/migrations_pg)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push migrations
        if: steps.check.outputs.has_changes == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        id: push
        env:
          PR_REF: ${{ github.event.pull_request.head.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/backend/drizzle/migrations/ packages/backend/drizzle/migrations_pg/
          git commit --no-verify -m "chore: auto-generate migrations for schema changes"
          git push origin HEAD:${PR_REF:-$REF_NAME}


