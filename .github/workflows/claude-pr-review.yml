name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.REPO_SUPER_TOKEN }}
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools Read,Write,Edit,Replace,Bash,Grep,Glob,TaskOutput,KillTask
          path_to_bun_executable: /home/runner/.bun/bin/bun
          assignee_trigger: claude
          show_full_output: true
          display_report: true
          use_sticky_comment: true
          include_fix_links: true
          track_progress: true
          prompt: >
            Review this pull request. Check for bugs, logic errors, security issues,
            and missing test coverage. Note any style or documentation concerns but
            focus on substantive problems. Post your findings as a PR review comment.
