name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          use_sticky_comment: true
          prompt: >
            Review this pull request. Check for bugs, logic errors, security issues,
            and missing test coverage. Note any style or documentation concerns but
            focus on substantive problems. Post your findings as a PR review comment.
