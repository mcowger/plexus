name: Claude PR Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.CLAUDE_SMALL_MODEL  }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt_file: .github/workflows/prompts/claude-pr-review.md
          allowed_non_write_users: '*'
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools Read,Grep,Glob,mcp__github__get_pull_request,mcp__github__list_pull_request_files,mcp__github__get_file_contents,mcp__github__search_code,mcp__github__get_pull_request_diff,mcp__github_comment__update_claude_comment,mcp__github__create_pending_pull_request_review,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__create_and_submit_pull_request_review
          path_to_bun_executable: /home/runner/.bun/bin/bun
          show_full_output: true
          display_report: true
          use_sticky_comment: true
          include_fix_links: false
          track_progress: true
