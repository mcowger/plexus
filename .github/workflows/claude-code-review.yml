name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: '--model ${{ vars.PLEXUS_MODEL }}'
          settings: |
            {
              "permissions": {
                "allow": [
                  "mcp__github_inline_comment__create_inline_comment",
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(git status:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(bun install:*)",
                  "Bash(bun run:*)",
                  "Bash(bun test:*)",
                  "Bash(npm run:*)",
                  "Bash(ls:*)",
                  "Bash(cat:*)",
                  "Bash(find:*)",
                  "Bash(grep:*)",
                  "Bash(head:*)",
                  "Bash(tail:*)",
                  "Bash(wc:*)"
                ]
              }
            }
          # NOTE: The code-review plugin has a known bug (#1087) where it completes the review
          # but produces an empty result, posting nothing to the PR. Using a direct prompt instead.
          prompt: |
            Review the pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }}.

            1. Read the PR diff using `git diff` and understand the changes.
            2. Analyze the code for bugs, security issues, performance problems, and style concerns.
            3. Post inline comments on specific lines using mcp__github_inline_comment__create_inline_comment with confirmed: true.
            4. Post a summary review comment on the PR using `gh pr comment`.

            Be thorough but concise. Focus on actionable issues, not nitpicks.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

