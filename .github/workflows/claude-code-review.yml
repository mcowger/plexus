name: Claude Code Review
run-name: "Code Review: ${{ github.event.workflow_run.pull_requests[0].title }}"

on:
  workflow_run:
    workflows: ["PR Tests"]
    types: [completed]

jobs:
  claude-review:
    if: github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write

    steps:
      - name: Get PR info from workflow run
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const pulls = context.payload.workflow_run.pull_requests;
            if (!pulls || pulls.length === 0) {
              core.setFailed('No pull request found in workflow_run event');
              return;
            }
            const pr = pulls[0];
            core.setOutput('number', pr.number);
            core.setOutput('head_sha', context.payload.workflow_run.head_sha);
            core.setOutput('head_repo', context.payload.workflow_run.head_repository.full_name);

      - name: Create in-progress check run on PR
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Claude Code Review',
              head_sha: '${{ steps.pr.outputs.head_sha }}',
              status: 'in_progress',
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            core.setOutput('check_id', check.id);

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 1

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: '--model ${{ vars.PLEXUS_MODEL }}'
          settings: |
            {
              "permissions": {
                "allow": [
                  "mcp__github_inline_comment__*",
                  "mcp__github_comment__*",
                  "Bash(gh pr comment:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr view:*)",
                  "Bash(git status:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(bun install:*)",
                  "Bash(bun run:*)",
                  "Bash(bun test:*)",
                  "Bash(npm run:*)",
                  "Bash(ls:*)",
                  "Bash(cat:*)",
                  "Bash(find:*)",
                  "Bash(grep:*)",
                  "Bash(head:*)",
                  "Bash(tail:*)",
                  "Bash(wc:*)"
                ]
              }
            }
          # NOTE: The code-review plugin has a known bug (#1087) where it completes the review
          # but produces an empty result, posting nothing to the PR. Using a direct prompt instead.
          prompt: |
            Review the pull request ${{ github.repository }}/pull/${{ steps.pr.outputs.number }}.

            1. Read the PR diff using `git diff` and understand the changes.
            2. Analyze the code for bugs, security issues, performance problems, and style concerns.
            3. Post inline comments on specific lines using mcp__github_inline_comment__create_inline_comment with confirmed: true.
            4. Post a summary review comment on the PR using `gh pr comment`.

            Be thorough but concise. Focus on actionable issues, not nitpicks.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Update check run result
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const success = '${{ steps.claude-review.outcome }}' === 'success';
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.check.outputs.check_id }},
              status: 'completed',
              conclusion: success ? 'success' : 'failure',
            });

