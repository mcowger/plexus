name: Claude Code

# The Claude Code action is configured via repository secrets and variables:
#
#   Secrets:
#     PLEXUS_API_KEY   — API key for the proxy
#     PLEXUS_BASE_URL  — Proxy URL (ANTHROPIC_BASE_URL)
#
#   Variables:
#     PLEXUS_MODEL       — Main work model (e.g. glm-5.1)
#     PLEXUS_SMALL_MODEL — Fast/classification model (e.g. claude-haiku-4-5)
#
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Register secrets for masking
        uses: actions/github-script@v9
        with:
          script: |
            core.setSecret(process.env.PLEXUS_API_KEY)
            core.setSecret(process.env.PLEXUS_BASE_URL)
        env:
          PLEXUS_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
          PLEXUS_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          claude_args: '--model ${{ vars.PLEXUS_MODEL }}'
          settings: |
            {
              "permissions": {
                "allow": [
                  "Write",
                  "Edit",
                  "Bash(git push:*)",
                  "Bash(git status:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git checkout:*)",
                  "Bash(git fetch:*)",
                  "Bash(git branch:*)",
                  "Bash(git rm:*)",
                  "Bash(bun install:*)",
                  "Bash(bun run:*)",
                  "Bash(bun test:*)",
                  "Bash(bunx:*)",
                  "Bash(npm run:*)",
                  "Bash(mkdir:*)",
                  "Bash(mv:*)",
                  "Bash(cp:*)",
                  "Bash(rm:*)",
                  "Bash(ls:*)",
                  "Bash(cat:*)",
                  "Bash(find:*)",
                  "Bash(grep:*)",
                  "Bash(head:*)",
                  "Bash(tail:*)",
                  "Bash(wc:*)",
                  "Bash(dirname:*)",
                  "Bash(basename:*)",
                  "Bash(sort:*)",
                  "Bash(uniq:*)",
                  "Bash(realpath:*)",
                  "Bash(readlink:*)",
                  "Bash(test:*)",
                  "Bash(touch:*)",
                  "Bash(chmod:*)"
                ]
              }
            }

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

      - name: Report issues if Claude failed
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const execFile = '${{ steps.claude.outputs.execution_file }}';
            const branchName = '${{ steps.claude.outputs.branch_name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            if (!execFile || !fs.existsSync(execFile)) {
              core.info('No execution file found, skipping report');
              return;
            }

            const exec = JSON.parse(fs.readFileSync(execFile, 'utf8'));
            const issues = [];

            if (exec.is_error) {
              issues.push('Claude reported an error during execution');
            }
            if (exec.permission_denials_count > 0) {
              issues.push(`Claude was denied permission ${exec.permission_denials_count} time(s) — likely missing tools in the allowed list. Add Write, Edit, etc. to the workflow settings.permissions.allow list.`);
            }
            if (!branchName) {
              issues.push('No branch was created — Claude may not have made any code changes');
            }

            if (issues.length === 0) {
              core.info('No issues detected, skipping report');
              return;
            }

            // Find Claude's comment to update (by the claude[bot] user on this issue/PR)
            const event = context.eventName;
            let issueNumber;
            if (event === 'issues') {
              issueNumber = context.payload.issue.number;
            } else if (event === 'issue_comment') {
              issueNumber = context.payload.issue.number;
            } else if (event === 'pull_request_review_comment') {
              issueNumber = context.payload.pull_request.number;
            } else if (event === 'pull_request_review') {
              issueNumber = context.payload.pull_request.number;
            }

            if (!issueNumber) {
              core.info('Could not determine issue/PR number, skipping report');
              return;
            }

            // Find the most recent comment by claude[bot]
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const claudeComment = comments.data
              .filter(c => c.user.login === 'claude[bot]')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (!claudeComment) {
              core.info('No claude[bot] comment found to update');
              return;
            }

            const warning = `\n\n---\n⚠️ **Issues detected:**\n${issues.map(i => '- ' + i).join('\n')}\n\n[View job run](${runUrl})`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: claudeComment.id,
              body: claudeComment.body + warning
            });

            core.setFailed(`Claude execution had issues: ${issues.join('; ')}`);

