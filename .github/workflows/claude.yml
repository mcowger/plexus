name: Claude Code

# The Claude Code action is configured via repository secrets and variables:
#
#   Secrets:
#     PLEXUS_API_KEY   — API key for the proxy
#     PLEXUS_BASE_URL  — Proxy URL (ANTHROPIC_BASE_URL)
#
#   Variables:
#     PLEXUS_MODEL       — Main work model (e.g. glm-5.1)
#     PLEXUS_SMALL_MODEL — Fast/classification model (e.g. claude-haiku-4-5)
#
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.PLEXUS_BASE_URL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.PLEXUS_SMALL_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.PLEXUS_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.PLEXUS_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.PLEXUS_API_KEY }}
          claude_args: >-
            --model ${{ vars.PLEXUS_MODEL }}
            --allowedTools Bash(git push:*) Bash(git status:*) Bash(git diff:*) Bash(git log:*) Bash(git checkout:*) Bash(git fetch:*) Bash(git branch:*) Bash(bun install:*) Bash(bun run:*) Bash(bun test:*) Bash(npm run:*) Bash(ls:*) Bash(cat:*) Bash(find:*) Bash(grep:*) Bash(head:*) Bash(tail:*) Bash(wc:*)

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specifically, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

