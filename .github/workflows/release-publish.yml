name: Publish Release
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag"
      release_notes:
        required: false
        type: string
        description: "Release notes body (Markdown)"
        default: ""

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p release
          cp artifacts/binary-linux-amd64/plexus-linux-amd64 release/
          cp artifacts/binary-linux-arm64/plexus-linux-arm64 release/
          cp artifacts/binary-macos/plexus-macos release/
          cp artifacts/binary-windows/plexus.exe release/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          body: ${{ inputs.release_notes }}
          files: |
            release/plexus-linux-amd64
            release/plexus-linux-arm64
            release/plexus-macos
            release/plexus.exe
          draft: false
          prerelease: false
