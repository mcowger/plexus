name: Generate Release Notes
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag"

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ inputs.tag }}"
          CURRENT_SHA=$(git rev-parse "${CURRENT_TAG}^{}")
          CURRENT_DATE=$(git log -1 --format=%ci "${CURRENT_SHA}")

          PREV_TAG=""
          for tag in $(git tag --sort=-creatordate --list "[0-9]*.[0-9]*.[0-9]*.[0-9]*" "v*.*.*" 2>/dev/null); do
            if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
            tag_sha=$(git rev-parse "${tag}^{}" 2>/dev/null || true)
            [ -z "$tag_sha" ] && continue
            tag_date=$(git log -1 --format=%ci "${tag_sha}")
            if [ "$tag_date" '<' "$CURRENT_DATE" ]; then
              PREV_TAG="$tag"
              break
            fi
          done

          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_TAG" ]; then
            echo "prev_sha=$(git rev-parse "${PREV_TAG}^{}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather commits and PR info
        id: commits
        uses: actions/github-script@v9
        with:
          script: |
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: '${{ steps.prev_tag.outputs.tag }}',
              head: '${{ steps.prev_tag.outputs.current_tag }}'
            });

            const results = [];
            for (const commit of comparison.commits) {
              const sha = commit.sha;
              const fullMessage = commit.commit.message;
              const shortMessage = fullMessage.split('\n')[0];
              const author = commit.commit.author.name;
              const date = commit.commit.author.date;
              const url = commit.html_url;

              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha
              });

              const pr = prs[0] ? {
                number: prs[0].number,
                title: prs[0].title,
                body: prs[0].body,
                url: prs[0].html_url,
                author: prs[0].user?.login,
                labels: prs[0].labels?.map(l => l.name) || [],
                merged_at: prs[0].merged_at
              } : null;

              results.push({ sha, fullMessage, shortMessage, author, date, url, pr });
            }

            const fs = require('fs');
            fs.writeFileSync('${{ github.workspace }}/github_changes.tmp.json', JSON.stringify(results, null, 2));

      - name: Generate release notes via Claude
        id: claude
        uses: anthropics/claude-code-base-action@main
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          INPUT_PROMPT_FILE: ${{ github.workspace }}/.github/workflows/prompts/release-generate-notes.md
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
            --json-schema '{"type":"object","properties":{"release_notes":{"type":"string"}},"required":["release_notes"]}'

      - name: Save structured output to file
        uses: actions/github-script@v9
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = path.join(process.env.RUNNER_TEMP, 'release-notes');
            fs.mkdirSync(dir, { recursive: true });
            const output = JSON.parse(process.env.STRUCTURED_OUTPUT || '{}');
            const notes = output.release_notes || 'Release notes generation did not produce output.';
            fs.writeFileSync(path.join(dir, 'notes.md'), notes);

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes/notes.md
          retention-days: 1