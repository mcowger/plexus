name: Generate Release Notes
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag"

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ inputs.tag }}"
          CURRENT_SHA=$(git rev-parse "${CURRENT_TAG}^{}")
          CURRENT_DATE=$(git log -1 --format=%ci "${CURRENT_SHA}")

          PREV_TAG=""
          for tag in $(git tag --sort=-creatordate --list "[0-9]*.[0-9]*.[0-9]*.[0-9]*" "v*.*.*" 2>/dev/null); do
            if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
            tag_sha=$(git rev-parse "${tag}^{}" 2>/dev/null || true)
            [ -z "$tag_sha" ] && continue
            tag_date=$(git log -1 --format=%ci "${tag_sha}")
            if [ "$tag_date" '<' "$CURRENT_DATE" ]; then
              PREV_TAG="$tag"
              break
            fi
          done

          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_TAG" ]; then
            echo "prev_sha=$(git rev-parse "${PREV_TAG}^{}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Gather PR and commit info between tags
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const prevTag = '${{ steps.prev_tag.outputs.tag }}';
            const currentTag = '${{ steps.prev_tag.outputs.current_tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { execSync } = require('child_process');
            let commits;
            try {
              const prevDate = execSync(`git log -1 --format=%ci '${prevTag}'`, { encoding: 'utf8' }).trim();
              const currentDate = execSync(`git log -1 --format=%ci '${currentTag}'`, { encoding: 'utf8' }).trim();
              commits = execSync(`git log --since='${prevDate}' --until='${currentDate}' --pretty=format:'%H'`, { encoding: 'utf8' }).trim().split('\n');
            } catch (e) {
              commits = [];
            }

            if (commits.length === 0 || (commits.length === 1 && commits[0] === '')) {
              core.setOutput('pr_summary', 'No commits found between tags.');
              return;
            }

            const prMap = new Map();
            const standaloneCommits = [];

            for (const sha of commits) {
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha
                });
                if (prs.length > 0) {
                  const pr = prs[0];
                  if (!prMap.has(pr.number)) {
                    prMap.set(pr.number, {
                      number: pr.number,
                      title: pr.title,
                      url: pr.html_url,
                      author: pr.user?.login || '',
                      commits: []
                    });
                  }
                  prMap.get(pr.number).commits.push(sha.substring(0, 7));
                } else {
                  const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                  const author = execSync(`git log -1 --pretty=format:'%an' ${sha}`, { encoding: 'utf8' }).trim();
                  standaloneCommits.push({
                    sha: sha.substring(0, 7),
                    message: msg,
                    author: author,
                    url: `https://github.com/${owner}/${repo}/commit/${sha}`
                  });
                }
              } catch (e) {
                const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                standaloneCommits.push({
                  sha: sha.substring(0, 7),
                  message: msg,
                  author: '',
                  url: `https://github.com/${owner}/${repo}/commit/${sha}`
                });
              }
            }

            let summary = '';
            if (prMap.size > 0) {
              summary += '## Pull Requests\n\n';
              for (const [number, pr] of prMap) {
                summary += `- PR #${number}: ${pr.title} (${pr.url}) by @${pr.author} [${pr.commits.length} commit(s): ${pr.commits.join(', ')}]\n`;
              }
              summary += '\n';
            }
            if (standaloneCommits.length > 0) {
              summary += '## Direct Commits (no associated PR)\n\n';
              for (const c of standaloneCommits) {
                summary += `- ${c.sha}: ${c.message} (${c.url})`;
                if (c.author) summary += ` by ${c.author}`;
                summary += '\n';
              }
            }

            core.setOutput('pr_summary', summary);

      - name: Write changes to file for Pi
        env:
          PR_SUMMARY: ${{ steps.pr_info.outputs.pr_summary }}
        run: |
          printf '%s' "$PR_SUMMARY" > changes.md

      - name: Generate release notes via Claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          prompt: >
            Generate release notes for version ${{ inputs.tag }}.
            Read the file `changes.md` in the current directory which lists all PRs and commits
            included in this release. Use ONLY that content — do not look up additional
            history. Omit CI/workflow/internal tooling changes unless they affect end users.
            Keep the tone concise and factual.
            Write ONLY the release notes markdown to a file called `release-notes.md`
            in the current directory. Do not output anything else.

      - name: Write release notes artifact
        run: |
          mkdir -p ${{ runner.temp }}/release-notes
          cp release-notes.md ${{ runner.temp }}/release-notes/notes.md

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes/notes.md
          retention-days: 1
