name: Generate Release Notes
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "The release tag"
    outputs:
      pr_summary:
        value: ${{ jobs.generate-notes.outputs.pr_summary }}

jobs:
  generate-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr_summary: ${{ steps.pr_info.outputs.pr_summary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ inputs.tag }}"
          CURRENT_SHA=$(git rev-parse "${CURRENT_TAG}^{}")

          # Find the previous tag that is an actual ancestor
          PREV_TAG=""
          for tag in $(git tag --sort=-version:refname --list "[0-9]*.[0-9]*.[0-9]*.[0-9]*" "v*.*.*" 2>/dev/null); do
            if [ "$tag" = "$CURRENT_TAG" ]; then continue; fi
            tag_sha=$(git rev-parse "${tag}^{}" 2>/dev/null || true)
            [ -z "$tag_sha" ] && continue
            if git merge-base --is-ancestor "$tag_sha" "$CURRENT_SHA" 2>/dev/null; then
              PREV_TAG="$tag"
              break
            fi
          done

          echo "Previous release tag: $PREV_TAG"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Gather PR and commit info between tags
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const prevTag = '${{ steps.prev_tag.outputs.tag }}';
            const currentTag = '${{ steps.prev_tag.outputs.current_tag }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { execSync } = require('child_process');
            let commits;
            try {
              commits = execSync(`git log ${prevTag}..${currentTag} --pretty=format:'%H'`, { encoding: 'utf8' }).trim().split('\n');
            } catch (e) {
              commits = [];
            }

            if (commits.length === 0 || (commits.length === 1 && commits[0] === '')) {
              core.setOutput('pr_summary', 'No commits found between tags.');
              return;
            }

            const prMap = new Map();
            const standaloneCommits = [];

            for (const sha of commits) {
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha
                });
                if (prs.length > 0) {
                  const pr = prs[0];
                  if (!prMap.has(pr.number)) {
                    prMap.set(pr.number, {
                      number: pr.number,
                      title: pr.title,
                      url: pr.html_url,
                      author: pr.user?.login || '',
                      authorUrl: pr.user?.html_url || '',
                      commits: []
                    });
                  }
                  prMap.get(pr.number).commits.push(sha.substring(0, 7));
                } else {
                  const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                  const author = execSync(`git log -1 --pretty=format:'%an' ${sha}`, { encoding: 'utf8' }).trim();
                  standaloneCommits.push({
                    sha: sha.substring(0, 7),
                    message: msg,
                    author: author,
                    url: `https://github.com/${owner}/${repo}/commit/${sha}`
                  });
                }
              } catch (e) {
                const msg = execSync(`git log -1 --pretty=format:'%s' ${sha}`, { encoding: 'utf8' }).trim();
                standaloneCommits.push({
                  sha: sha.substring(0, 7),
                  message: msg,
                  author: '',
                  url: `https://github.com/${owner}/${repo}/commit/${sha}`
                });
              }
            }

            let summary = '';
            if (prMap.size > 0) {
              summary += '## Pull Requests\n\n';
              for (const [number, pr] of prMap) {
                summary += `- PR #${number}: ${pr.title} (${pr.url}) by @${pr.author} [${pr.commits.length} commit(s): ${pr.commits.join(', ')}]\n`;
              }
              summary += '\n';
            }
            if (standaloneCommits.length > 0) {
              summary += '## Direct Commits (no associated PR)\n\n';
              for (const c of standaloneCommits) {
                summary += `- ${c.sha}: ${c.message} (${c.url})`;
                if (c.author) summary += ` by ${c.author}`;
                summary += '\n';
              }
            }

            core.setOutput('pr_summary', summary);

      - name: Extract OpenRouter config
        id: openrouter
        env:
          PI_MODELS_JSON: ${{ secrets.PI_MODELS_JSON }}
        run: |
          API_KEY=$(echo "$PI_MODELS_JSON" | jq -r '.providers.openrouter.apiKey // empty')
          ENDPOINT=$(echo "$PI_MODELS_JSON" | jq -r '
            .providers.openrouter.endpoint //
            .providers.openrouter.baseUrl //
            .providers.openrouter.baseURL //
            .providers.openrouter.baseurl //
            .providers.openrouter.base_url //
            .providers.openrouter.apiUrl //
            .providers.openrouter.api_url //
            empty
          ')
          if [ -z "$API_KEY" ]; then
            echo "Error: OpenRouter API key not found in PI_MODELS_JSON" >&2
            exit 1
          fi
          if [ -z "$ENDPOINT" ]; then
            echo "Error: OpenRouter endpoint not found in PI_MODELS_JSON" >&2
            exit 1
          fi
          echo "::add-mask::$API_KEY"
          echo "::add-mask::$ENDPOINT"
          echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      - name: Generate release notes via LLM
        id: release_notes
        env:
          LLM_API_KEY: ${{ steps.openrouter.outputs.key }}
          LLM_ENDPOINT: ${{ steps.openrouter.outputs.endpoint }}/chat/completions
          MODEL: ${{ vars.PLEXUS_MODEL }}
          PROMPT: |
            Generate release notes for version ${{ inputs.tag }}.

            IMPORTANT RULES:
            - Use ONLY the Source Changes listed below. Do NOT look up additional commits, PRs, issues, or repository history.
            - Do NOT include changes that are not listed below.
            - Do NOT mention features, fixes, or PRs from previous releases.
            - If a change is a CI/workflow/internal tooling change (like GitHub Actions, release scripts, or prompt updates), omit it entirely unless it directly affects end users.
            - Keep the tone concise and factual.

            ## Source Changes

            ${{ steps.pr_info.outputs.pr_summary }}
        run: |
          node -e "
          const fs = require('fs');
          const prompt = process.env.PROMPT;
          const model = process.env.MODEL;
          const apiKey = process.env.LLM_API_KEY;
          const endpoint = process.env.LLM_ENDPOINT;

          async function main() {
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + apiKey,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: model,
                messages: [
                  { role: 'system', content: 'You are a technical writer drafting concise, factual release notes for a software project. Only use the information provided in the user message. Do not look up external data.' },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.3,
              }),
            });

            if (!res.ok) {
              const text = await res.text();
              console.error('LLM error:', res.status, text);
              process.exit(1);
            }

            const data = await res.json();
            const content = data.choices?.[0]?.message?.content || '';

            // Write to GITHUB_OUTPUT
            const output = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(output, 'response<<EOF\n' + content + '\nEOF\n');
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          "

      - name: Write release notes to file
        env:
          NOTES: ${{ steps.release_notes.outputs.response }}
        run: |
          mkdir -p ${{ runner.temp }}/release-notes
          node -e "require('fs').writeFileSync('${{ runner.temp }}/release-notes/notes.md', process.env.NOTES)"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: ${{ runner.temp }}/release-notes/notes.md
          retention-days: 1
